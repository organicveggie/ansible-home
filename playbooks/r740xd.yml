---
- name: "Setup users and groups"
  hosts: "veggie_nas"
  remote_user: "sean"
  become: true

  vars:
    _r740xd_plex_music_path: "/nas-mirror/music"
    _r740xd_plex_old_music_path: "/nas-mirror/music-old"
    _r740xd_plex_videos_path: "/data/videos"
    _glances_config_data:
      glances_docker_config:
        diskio:
          "hide": "loop.*,md0"
        fs:
          "hide": "/etc.*"
        network:
          "hide": "docker.*,lo"

  roles:
    - role: "r740xd"
      vars:
        # Admin user
        r740xd_admin_username: "{{ veggie_nas_admin_username }}"
        r740xd_admin_passwd: "{{ veggie_nas_admin_passwd }}"
        # AWS Route53
        r740xd_aws_route53_hosted_zone_id: "{{ vault_nas_aws_route53_hosted_zone_id }}"
        r740xd_aws_route53_access_key_id: "{{ vault_nas_aws_route53_access_key_id }}"
        r740xd_aws_route53_region: "{{ vault_nas_aws_route53_region }}"
        r740xd_aws_route53_secret_access_key: "{{ vault_nas_aws_route53_secret_access_key }}"
        # Bazarr
        r740xd_bazarr1080_host_domain: "{{ veggie_new_base_domain_name }}"
        r740xd_bazarr4k_host_domain: "{{ veggie_new_base_domain_name }}"
        # Calibre Web
        r740xd_calibre_web_book_dir: "{{ vault_calibre_web_docker_book_dir }}"
        r740xd_calibre_web_gid: "{{ vault_calibre_web_docker_gid }}"
        r740xd_calibre_web_host_domain: "{{ veggie_base_domain_name }}"
        r740xd_calibre_web_uid: "{{ vault_calibre_web_docker_uid }}"
        # Cloudflare
        r740xd_servarr_cloudflared_token: "{{ vault_servarr_cloudflared_token }}"
        # Cross-Seed
        r740xd_cross_seed_api_key: "{{ vault_cross_seed_api_key }}"
        r740xd_cross_seed_prowlarr_api_key: "{{ vault_cross_seed_prowlarr_api_key }}"
        r740xd_cross_seed_prowlarr_indexer_ids: ["9", "11", "12"]
        r740xd_cross_seed_qbittorrent_url: "{{ vault_cross_seed_qbittorrent_url }}"
        r740xd_cross_seed_radarr1080_apikey: "{{ vault_cross_seed_radarr1080_apikey }}"
        r740xd_cross_seed_radarr4k_apikey: "{{ vault_cross_seed_radarr4k_apikey }}"
        r740xd_cross_seed_sonarr1080_apikey: "{{ vault_cross_seed_sonarr1080_apikey }}"
        r740xd_cross_seed_sonarr4k_apikey: "{{ vault_cross_seed_sonarr4k_apikey }}"
        # Diun
        r740xd_diun_notify_mail_host: "{{ vault_diun_notify_mail_host }}"
        r740xd_diun_notify_mail_port: "{{ vault_diun_notify_mail_port }}"
        r740xd_diun_notify_mail_username: "{{ vault_diun_notify_mail_username }}"
        r740xd_diun_notify_mail_password: "{{ vault_diun_notify_mail_password }}"
        r740xd_diun_notify_mail_from: "{{ vault_diun_notify_mail_from }}"
        r740xd_diun_notify_mail_to: "{{ vault_diun_notify_mail_to }}"
        r740xd_diun_regopts_dockerio_user: "{{ vault_diun_regopts_dockerio_user }}"
        r740xd_diun_regopts_dockerio_passwd: "{{ vault_diun_regopts_dockerio_passwd }}"
        # Docker
        r740xd_docker_macvlan_gateway: "{{ veggie_nas_docker_macvlan_gateway  }}"
        r740xd_docker_macvlan_iprange: "{{ veggie_nas_docker_macvlan_iprange }}"
        r740xd_docker_macvlan_network_parent: "{{ veggie_nas_docker_macvlan_network_parent }}"
        r740xd_docker_macvlan_subnet: "{{ veggie_nas_docker_macvlan_subnet }}"
        r740xd_docker_users: "{{ vault_nas_docker_users }}"
        # Domain name
        r740xd_site_domain: "{{ veggie_base_domain_name }}"
        r740xd_domain_name: "{{ veggie_nas_domain_name }}"
        # Glances
        r740xd_glances_config_data: "{{ _glances_config_data }}"
        # Groups
        r740xd_groups: "{{ veggie_nas_groups }}"
        # Home Assistant
        r740xd_hass_ecowitt_hass_auth_token: "{{ vault_homeassistant_ecowitt_hass_auth_token }}"
        r740xd_hass_ecowitt_hass_webhook_id: "{{ vault_homeassistant_ecowitt_hass_webhook_id }}"
        r740xd_hass_host_domain: "{{ vault_veggie_home_domain }}"
        r740xd_hass_latitude: "{{ homeassistant_home_latitude }}"
        r740xd_hass_longitude: "{{ homeassistant_home_longitude }}"
        r740xd_hass_pgsql_admin_password: "{{ homeassistant_pgsql_admin_password }}"
        r740xd_hass_pgsql_init_tempates_dir: "{{ homeassistant_pgsql_init_tempates_dir }}"
        r740xd_hass_timezone: "{{ home_timezone }}"
        r740xd_hass_zwave_device: "{{ vault_homeassistant_zwave_device }}"
        # InfluxDB
        r740xd_influxdb_host_domain: "{{ veggie_nas_domain_name }}"
        # Kometa
        r740xd_kometa_libraries: "{{ kometa_libraries }}"
        r740xd_kometa_mdblist_apikey: "{{ vault_kometa_docker_mdblist_apikey }}"
        r740xd_kometa_plex_token: "{{ vault_kometa_docker_plex_token }}"
        r740xd_kometa_plex_url: "{{ vault_kometa_docker_plex_url }}"
        r740xd_kometa_run_once_only: false
        r740xd_kometa_tautulli_apikey: "{{ vault_kometa_docker_tautulli_apikey }}"
        r740xd_kometa_tmdb_apikey: "{{ vault_kometa_docker_tmdb_apikey }}"
        r740xd_kometa_trakt: "{{ kometa_trakt }}"
        # Lidarr
        r740xd_lidarr_host_domain: "{{ veggie_base_domain_name }}"
        # Navidrome
        r740xd_navidrome_host_domain: "{{ veggie_base_domain_name }}"
        r740xd_navidrome_lastfm_apikey: "{{ navidrome_lastfm_apikey }}"
        r740xd_navidrome_lastfm_secret: "{{ navidrome_lastfm_secret }}"
        r740xd_navidrome_music_folder: "{{ navidrome_music_folder }}"
        r740xd_navidrome_spotify_client_id: "{{ navidrome_spotify_client_id }}"
        r740xd_navidrome_spotify_client_secret: "{{ navidrome_spotify_client_secret }}" 
        # Node-RED
        r740xd_nodered_timezone: "{{ home_timezone }}"
        # Plex
        r740xd_plex_claim: "{{ vault_plex_docker_claim }}"
        r740xd_plex_network_ipv4: "{{ vault_plex_network_ipv4 }}"
        r740xd_plex_music_path: "{{ _r740xd_plex_music_path }}"
        r740xd_plex_old_music_path: "{{ _r740xd_plex_old_music_path }}"
        r740xd_plex_videos_path: "{{ _r740xd_plex_videos_path }}"
        # Prowlarr
        r740xd_prowlarr_host_domain: "{{ veggie_base_domain_name }}"
        # Radarr
        r740xd_radarr1080_api_key: "{{ vault_radarr1080_api_key }}"
        r740xd_radarr1080_host_domain: "{{ veggie_base_domain_name }}"
        r740xd_radarr4k_api_key: "{{ vault_radarr4k_api_key }}"
        r740xd_radarr4k_host_domain: "{{ veggie_base_domain_name }}"
        # Readarr
        r740xd_readarr_api_key: "{{ vault_readarr_api_key }}"
        r740xd_readarr_host_domain: "{{ veggie_base_domain_name }}"
        r740xd_readarr_library_path: "{{ vault_readarr_library_path }}"
        # Sabnzbd
        r740xd_sabnzbd_host_domain: "{{ veggie_base_domain_name }}"
        # Samba
        r740xd_samba_group_ids: "{{ vault_nas_samba_group_ids }}"
        r740xd_samba_hosts_allow: "{{ vault_nas_samba_hosts_allow }}"
        r740xd_samba_network_ipv4: "{{ vault_nas_samba_network_ipv4 }}"
        r740xd_samba_user_acounts: "{{ vault_nas_samba_user_acounts }}"
        # Saurron
        r740xd_saurron_email_from: "{{ vault_saurron_email_from }}"
        r740xd_saurron_email_server_port: "{{ vault_saurron_email_server_port }}"
        r740xd_saurron_email_server: "{{ vault_saurron_email_server }}"
        r740xd_saurron_email_to: 
          - "{{ primary_email_address }}"
        r740xd_saurron_email_user: "{{ vault_saurron_email_user }}"
        r740xd_saurron_email_password: "{{ vault_saurron_email_password }}"
        r740xd_saurron_host_domain: "{{ vault_veggie_home_domain }}"
        r740xd_saurron_http_api_token: "{{ vault_saurron_http_api_token }}"
        r740xd_saurron_timezone: "{{ home_timezone }}"
        # Seerr
        r740xd_seerr_host_domain: "{{ veggie_base_domain_name }}"
        # Servarr
        r740xd_servarr_movie_source_path: "{{ vault_servarr_movie_path }}"
        r740xd_servarr_path: "{{ vault_servarr_path }}"
        r740xd_servarr_tv_source_path: "{{ vault_servarr_tv_path }}"
        r740xd_servarr_zfs_dataset: "{{ vault_servarr_zfs_dataset }}"
        # Sonarr
        r740xd_sonarr1080_api_key: "{{ vault_sonarr1080_api_key }}"
        r740xd_sonarr1080_host_domain: "{{ veggie_base_domain_name }}"
        r740xd_sonarr4k_api_key: "{{ vault_sonarr4k_api_key }}"
        r740xd_sonarr4k_host_domain: "{{ veggie_base_domain_name }}"
        # Syncthing
        r740xd_syncthing_host_domain: "{{ veggie_base_domain_name }}"
        # Tautulli
        r740xd_tautulli_host_domain: "{{ veggie_base_domain_name }}"
        # TimeMachine
        r740xd_time_machine_data_directory: "{{ vault_time_machine_data_directory }}"
        r740xd_time_machine_hostname: "{{ vault_time_machine_hostname }}"
        r740xd_time_machine_network_ipv4: "{{ vault_time_machine_network_ipv4 }}"
        r740xd_time_machine_password: "{{ vault_time_machine_password }}"
        r740xd_time_machine_zfs_dataset: "{{ vault_time_machine_zfs_dataset }}"
        # Traefik
        r740xd_traefik_letsencrypt_email: "{{ primary_email_address }}"
        # UniFi Controller
        r740xd_unific_host_domain: "{{ veggie_base_domain_name }}"
        # NAS
        r740xd_timezone: "{{ home_timezone }}"
        r740xd_users: "{{ veggie_nas_users }}"
