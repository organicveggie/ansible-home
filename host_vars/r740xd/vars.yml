            # rating3_font_size: 70
        - pmm: ratings
          template_variables:
            builder_level: episode
            rating1: critic
            rating1_image: imdb
            # rating1_font: config/metadata/fonts/Impact.ttf
            # rating1_font_size: 70

            rating2: audience
            rating2_image: tmdb
            # rating2_font: config/metadata/fonts/Avenir_95_Black.ttf
            # rating2_font_size: 70
      operations:
        mass_user_rating_update: mdb_tomatoes   # Update user ratings with mdb_tomatoes
        mass_critic_rating_update: imdb         # Update critic ratings with imdb
        mass_audience_rating_update: tmdb       # Update audience ratings with tmdb
        mass_episode_critic_rating_update: imdb
        mass_episode_audience_rating_update: tmdb
    Anime Movies:
      schedule: weekly(thursday)
      report_path: /config/reports/Anime_Movies.yml
      template_variables:
        language: en
      collection_files:
        - pmm: anilist
        - pmm: basic
        - pmm: myanimelist
    Anime Series:
      schedule: weekly(friday)
      report_path: /config/reports/Anime_Series.yml
      template_variables:
        language: en
      collection_files:
        - pmm: anilist
        - pmm: basic
        - pmm: myanimelist

# See https://replit.com/@chazlarson/TraktAuth to generate the auth data.
kometa_trakt: |2
    client_id: {{ vault_kometa_trakt_client_id }}
    client_secret: {{ vault_kometa_trakt_client_secret }}
    pin:
    authorization:
      access_token: {{ vault_kometa_trakt_access_token }}
      token_type: {{ vault_kometa_trakt_token_type }}
      expires_in: {{ vault_kometa_trakt_expires_in }}
      refresh_token: {{ vault_kometa_trakt_refresh_token }}
      scope: {{ vault_kometa_trakt_scope }}
      created_at: {{ vault_kometa_trakt_created_at }}

###
### Navidrome
###
navidrome_base_url: "https://navidrome"

###
### Network
###
docker_macvlans:
  mgmnt:
    name: "mgmt"
    network_parent: "{{ vault_docker_macvlan_mgmt.parent }}"
    enable_ipv6: false
    internal: false
    scope: "local"
    ipam_config:
      - subnet: "{{ vault_docker_macvlan_mgmt.subnet }}"
        gateway: "{{ vault_docker_macvlan_mgmt.gateway }}"
        iprange: "{{ vault_docker_macvlan_mgmt.iprange }}"
  iot:
    name: "iot"
    network_parent: "{{ vault_docker_macvlan_iot.parent }}"
    enable_ipv6: false
    internal: false
    scope: "local"
    ipam_config:
      - subnet: "{{ vault_docker_macvlan_iot.subnet }}"
        gateway: "{{ vault_docker_macvlan_iot.gateway }}"
        iprange: "{{ vault_docker_macvlan_iot.iprange }}"
  nas_macvlan:
    name: "nas_macvlan"
    network_parent: "{{ vault_docker_macvlan_default.parent }}"
    enable_ipv6: false
    internal: false
    scope: "local"
    ipam_config:
      - subnet: "{{ vault_docker_macvlan_default.subnet }}"
        gateway: "{{ vault_docker_macvlan_default.gateway }}"
        iprange: "{{ vault_docker_macvlan_default.iprange }}"

