---
###
### Docker
###
r740xd_docker_zfs_dataset: "data/docker"
r740xd_docker_home: "/{{ r740xd_docker_zfs_dataset }}"

###
### Glances
###
glances_host_domain_name: "{{ veggie_fqdn }}"
glances_config_data:
  diskio:
    "hide": "loop.*,md0,sd[b-z][0-9]"
  folders:
    "folder_1_path": "/nas-mirror/books"
    "folder_2_path": "/nas-mirror/documents"
    "folder_3_path": "/nas-mirror/music"
    "folder_4_path": "/nas-mirror/photos"
    "folder_5_path": "/nas-mirror/time=machine"
    "folder_6_path": "/data/videos/movies/1080p"
    "folder_7_path": "/data/videos/movies/2160p"
    "folder_8_path": "/data/videos/tv/1080p"
    "folder_9_path": "/data/videos/tv/2160p"
  fs:
    "hide": "/etc.*"
  network:
    "disabled": "true"
    "hide": "docker.*,lo,veth.*"
glances_extra_bind_mounts:
    - source: "/nas-mirror/books"
      target: "/nas-mirror/books"
      type: "bind"
      read_only: true
    - source: "/nas-mirror/documents"
      target: "/nas-mirror/documents"
      type: "bind"
      read_only: true
    - source: "/nas-mirror/music"
      target: "/nas-mirror/music"
      type: "bind"
      read_only: true
    - source: "/nas-mirror/photos"
      target: "/nas-mirror/photos"
      type: "bind"
      read_only: true
    - source: "/nas-mirror/time-machine"
      target: "/nas-mirror/time-machine"
      type: "bind"
      read_only: true
    - source: "/data/videos/movies/1080p"
      target: "/data/videos/movies/1080p"
      type: "bind"
      read_only: true
    - source: "/data/videos/movies/2160p"
      target: "/data/videos/movies/2160p"
      type: "bind"
      read_only: true
    - source: "/data/videos/tv/1080p"
      target: "/data/videos/tv/1080p"
      type: "bind"
      read_only: true
    - source: "/data/videos/tv/2160p"
      target: "/data/videos/tv/2160p"
      type: "bind"
      read_only: true

###
### Home Assistant
###
hass_ecowitt_hass_auth_token: "{{ vault_hass_ecowitt_hass_auth_token }}"
hass_ecowitt_hass_webhook_id: "{{ vault_hass_ecowitt_hass_webhook_id }}"
hass_zwave_device: "{{ vault_hass_zwave_device }}"

###
### Kometa
###
kometa_cpus: "4"
kometa_memory: "4G"
kometa_timezone: "{{ home_timezone }}"

kometa_global_save_report: true
kometa_mdblist_apikey: "{{ vault_kometa_mdblist_apikey }}"
kometa_mdblist_cache_expiration: "60"
kometa_plex_db_cache: "2048" # MB
kometa_plex_token: "{{ vault_kometa_plex_token }}"
kometa_tmdb_apikey: "{{ vault_kometa_tmdb_apikey }}"
kometa_tmdb_language: "en"
kometa_tmdb_region: "US"
kometa_tautulli_apikey: "{{ vault_kometa_tautulli_apikey }}"
kometa_libraries: |2
    Movies:
      schedule: weekly(sunday)
      report_path: /config/reports/Movies-1080p.yml
      template_variables:
        language: "en"
      collection_files:
        - pmm: actor
        - pmm: basic
        - pmm: bafta
        - pmm: cannes
        - pmm: decade
        - pmm: director
        - pmm: franchise
          template_variables:
            data:
              visible_home: true
        - pmm: genre
          template_variables:
            data:
              visible_home: true
        - pmm: imdb
        - pmm: oscars
          template_variables:
            data:
              starting: current_year-10
              ending: current_year
        - pmm: seasonal
          template_variables:
            data:
              visible_home: true
        - pmm: streaming
        - pmm: sundance
        - pmm: tmdb
        - pmm: universe
        - pmm: year
      overlay_files:
        - remove_overlays: false
        - pmm: resolution
        - pmm: audio_codec
        - pmm: streaming
        - pmm: video_format
        - pmm: ratings
          template_variables:
            rating1: critic
            rating1_image: imdb
            # rating1_font: config/metadata/fonts/Impact.ttf
            # rating1_font_size: 70

            rating2: audience
            rating2_image: rt_popcorn
            # rating2_font: config/metadata/fonts/Adlib.ttf
            # rating2_font_size: 63

            rating3: user
            rating3_image: tmdb
            # rating3_font: config/metadata/fonts/Avenir_95_Black.ttf
            # rating3_font_size: 70
        - pmm: ribbon
      operations:
        mass_user_rating_update: mdb_tomatoes   # Update user ratings with mdb_tomatoes
        mass_critic_rating_update: imdb         # Update critic ratings with imdb
        mass_audience_rating_update: tmdb       # Update audience ratings with tmdb
    Movies (4K):
      schedule: weekly(monday)
      report_path: /config/reports/Movies-4K.yml
      template_variables:
        language: "en"
      collection_files:
        - pmm: actor
        - pmm: basic
        - pmm: bafta
        - pmm: cannes
        - pmm: decade
        - pmm: director
        - pmm: franchise
          template_variables:
            data:
              visible_home: true
        - pmm: genre
          template_variables:
            data:
              visible_home: true
        - pmm: imdb
        - pmm: oscars
          template_variables:
            data:
              starting: current_year-10
              ending: current_year
        - pmm: seasonal
          template_variables:
            data:
              visible_home: true
        - pmm: streaming
        - pmm: sundance
        - pmm: tmdb
        - pmm: universe
        - pmm: year
      overlay_files:
        - remove_overlays: false
        - pmm: resolution
        - pmm: audio_codec
        - pmm: streaming
        - pmm: video_format
        - pmm: ratings
          template_variables:
            rating1: critic
            rating1_image: imdb
            # rating1_font: config/metadata/fonts/Impact.ttf
            # rating1_font_size: 70

            rating2: audience
            rating2_image: rt_popcorn
            # rating2_font: config/metadata/fonts/Adlib.ttf
            # rating2_font_size: 63

            rating3: user
            rating3_image: tmdb
            # rating3_font: config/metadata/fonts/Avenir_95_Black.ttf
            # rating3_font_size: 70
        - pmm: ribbon
      operations:
        mass_user_rating_update: mdb_tomatoes   # Update user ratings with mdb_tomatoes
        mass_critic_rating_update: imdb         # Update critic ratings with imdb
        mass_audience_rating_update: tmdb       # Update audience ratings with tmdb
    TV Shows:
      schedule: weekly(tuesday)
      report_path: /config/reports/TV_Shows-1080p.yml
      template_variables:
        language: en
      collection_files:
        - pmm: basic
        - pmm: franchise
        - pmm: genre
        - pmm: network
        - pmm: year
      overlay_files:
        - remove_overlays: false
        - pmm: resolution
        - pmm: resolution
          template_variables:
            builder_level: season
        - pmm: resolution
          template_variables:
            builder_level: episode
        - pmm: audio_codec
        - pmm: audio_codec
          template_variables:
            builder_level: season
        - pmm: audio_codec
          template_variables:
