        - pmm: audio_codec
        - pmm: audio_codec
          template_variables:
            builder_level: season
        - pmm: audio_codec
          template_variables:
            builder_level: episode
        - pmm: streaming
        - pmm: video_format
        - pmm: video_format
          template_variables:
            builder_level: season
        - pmm: video_format
          template_variables:
            builder_level: episode
        - pmm: episode_info
          template_variables:
            builder_level: episode
        - pmm: runtimes
          template_variables:
            builder_level: episode
        - pmm: ribbon
        - pmm: ratings
          template_variables:
            rating1: critic
            rating1_image: imdb
            # rating1_font: config/metadata/fonts/Impact.ttf
            # rating1_font_size: 70

            rating2: audience
            rating2_image: rt_popcorn
            # rating2_font: config/metadata/fonts/Adlib.ttf
            # rating2_font_size: 63

            rating3: user
            rating3_image: tmdb
