          template_variables:
            builder_level: season
        - pmm: video_format
          template_variables:
            builder_level: episode
        - pmm: episode_info
          template_variables:
            builder_level: episode
        - pmm: runtimes
          template_variables:
            builder_level: episode
        - pmm: ribbon
