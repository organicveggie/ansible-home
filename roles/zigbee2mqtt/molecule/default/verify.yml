---
- name: Verify
  hosts: all
  gather_facts: false

  vars:
    zigbee2mqtt_docker_name: "zigbee2mqtt-container-test"
    zigbee2mqtt_docker_volume_data_name: "zigbee2mqtt-data-volume-test"

  tasks:
    - name: Get info on data volume
      community.docker.docker_volume_info:
        name: "{{ zigbee2mqtt_docker_volume_data_name }}"
      register: data_vol_info

    - name: Verify data volume exists
      ansible.builtin.assert:
        that: data_vol_info.exists

    - name: Get info on Zigbee2MQTT container
      community.docker.docker_container_info:
        name: "{{ zigbee2mqtt_docker_name }}"
      register: container_info

    - name: Verify container exists
      ansible.builtin.assert:
        that: container_info.exists
