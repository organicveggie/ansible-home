---
- name: "{{ zigbee2mqtt_docker_role_label }} | Create Mosquitto Docker volumes"
  community.docker.docker_volume:
    name: "{{ __item }}"
  with_items:
    - "{{ zigbee2mqtt_docker_volume_data_name }}"
  loop_control:
    loop_var: __item

- name: "{{ zigbee2mqtt_docker_role_label }} | Set Docker mount list for bind mounts"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_mount_list:
      - "source": "/run/udev"
        "target": "/run/udev"
        "type": 'bind'
        "read_only": true

- name: "{{ zigbee2mqtt_docker_role_label }} | Set Docker mount list for volume mounts"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_mount_list: |
      {{ _zigbee2mqtt_docker_mount_list | default([]) + [
        {
          "source": "{{ zigbee2mqtt_docker_volume_data_name }}",
          "target": "/app/data",
          "type": 'volume'
        }
      ] }}
  
- name: "{{ zigbee2mqtt_docker_role_label }} | Get info on data volume"
  community.docker.docker_volume_info:
    name: "{{ zigbee2mqtt_docker_volume_data_name }}"
  register: "_zigbee2mqtt_docker_data_volume_info"

- name: "{{ zigbee2mqtt_docker_role_label }} | Create config file"
  ansible.builtin.template:
    src: "templates/mosquitto.conf.j2"
    dest: "{{ _zigbee2mqtt_docker_data_volume_info.volume.Mountpoint }}/configuration.yaml"
    mode: "0640"
  register: "_zigbee2mqtt_docker_config_file"
  when: "zigbee2mqtt_docker_create_config"

- name: "{{ zigbee2mqtt_docker_role_label }} | Build container FQDN"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_fqdn: "{{ zigbee2mqtt_docker_host_name }}.{{ zigbee2mqtt_docker_host_domain }}"

- name: "{{ zigbee2mqtt_docker_role_label }} | Create placeholder array for default network"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_default_networks:
      - name: "{{ zigbee2mqtt_docker_network_name }}"
        aliases: "{{ zigbee2mqtt_docker_network_aliases | default(omit) }}"

- name: "{{ zigbee2mqtt_docker_role_label }} | Define all Docker networks for this container"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_all_networks: >
      {{ _zigbee2mqtt_docker_default_networks + zigbee2mqtt_docker_extra_networks }}

- name: "{{ zigbee2mqtt_docker_role_label }} | Define common Docker labels"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_labels:
      "traefik.enable": "{{ zigbee2mqtt_docker_traefik_available_externally | ternary('true', 'false') }}"

- name: "{{ zigbee2mqtt_docker_role_label }} | Define Docker labels with Traefik enabled"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_labels: "{{ _zigbee2mqtt_docker_labels | default({}) |
      combine({__item.key: __item.value}) }}"
  with_items:
    - key: "traefik.http.routers.zigbee2mqtt.rule"
      value: "Host(`{{ _zigbee2mqtt_docker_fqdn }}`)"
    - key: "traefik.http.routers.zigbee2mqtt.entrypoints"
      value: "http,https"
    - key: "traefik.http.routers.zigbee2mqtt.tls.certresolver"
      value: "letsencrypt"
    - key: "traefik.http.routers.zigbee2mqtt.tls.domains[0].main"
      value: "*.{{ zigbee2mqtt_docker_host_domain }}"
    - key: "traefik.http.services.zigbee2mqtt.loadbalancer.server.port"
      value: "{{ zigbee2mqtt_docker_http_port }}"
  loop_control:
    loop_var: __item
  when: "zigbee2mqtt_docker_available_externally"

- name: "{{ zigbee2mqtt_docker_role_label }} | Define user-supplied extra Docker labels"
  ansible.builtin.set_fact:
    _zigbee2mqtt_docker_labels: "{{ _zigbee2mqtt_docker_labels | default({}) |
      combine({__item.key: __item.value}) }}"
  loop: "{{ zigbee2mqtt_docker_extra_labels | dict2items }}"
  loop_control:
    loop_var: __item

- name: "{{ zigbee2mqtt_docker_role_label }} | Create Docker Container"
  community.docker.docker_container:
    name: "{{ zigbee2mqtt_docker_name }}"
    image: "{{ zigbee2mqtt_docker_image_name }}:{{ zigbee2mqtt_docker_image_version }}"
    pull: true
    mounts: "{{ _zigbee2mqtt_docker_mount_list }}"
    env:
      TZ: "{{ zigbee2mqtt_docker_timezone }}"
    devices:
      - "{{ zigbee2mqtt_docker_device }}:/dev/ttyACM0"
    network_mode: "{{ zigbee2mqtt_docker_network_name }}"
    networks: "{{ _zigbee2mqtt_docker_all_networks }}"
    etc_hosts: "{{ zigbee2mqtt_docker_extra_hosts | default(omit) }}"
    restart_policy: unless-stopped
    restart: "{{ _zigbee2mqtt_docker_config_file.changed | default(false) }}"
    memory: "{{ zigbee2mqtt_docker_memory }}"
    cpus: "{{ zigbee2mqtt_docker_cpus }}"
    container_default_behavior: no_defaults
    auto_remove: no
    detach: yes
    init: yes
    interactive: no
    paused: no
    privileged: no
    read_only: no
    tty: no
    labels: "{{ _zigbee2mqtt_docker_labels }}"
