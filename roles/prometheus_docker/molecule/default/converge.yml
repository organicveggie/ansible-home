---
- name: Install dependencies
  hosts: all
  become: true

  vars:
    pip_install_packages:
      - name: docker
    docker_daemon_options:
      storage-driver: "vfs"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_facts["os_family"] == 'Debian'

    - name: Wait for systemd to complete initialization
      ansible.builtin.systemd_service:
      register: _prometheus_docker_systemd_status
      until: >
        'running' in _prometheus_docker_systemd_status.ansible_facts.ansible_systemd.health or
        'degraded' in _prometheus_docker_systemd_status.ansible_facts.ansible_systemd.health
      retries: 30
      delay: 5
      when: ansible_facts["service_mgr"] == 'systemd'
      changed_when: false

  roles:
    - geerlingguy.pip
    - geerlingguy.docker

- name: Converge
  hosts: all
  become: true

  vars:
    prometheus_docker_network_name: "prometheus-test"
    prometheus_docker_available_externally: false

  pre_tasks:
    - name: Create prometheus-test Docker network
      community.docker.docker_network:
        name: prometheus-test
        state: present

  roles:
    - role: prometheus_docker
