---
- name: Verify
  hosts: all
  gather_facts: false

  vars:
    prometheus_docker_volume_name_data: "prometheus-data"

  tasks:
    - name: Get info on data volume
      community.docker.docker_volume_info:
        name: "{{ prometheus_docker_volume_name_data }}"
      register: data_vol_info

    - name: Verify data volume exists
      ansible.builtin.assert:
        that: data_vol_info.exists

    - name: Get info on Prometheus container
      community.docker.docker_container_info:
        name: prometheus
      register: con_info

    - name: Verify container exists
      ansible.builtin.assert:
        that: con_info.exists
