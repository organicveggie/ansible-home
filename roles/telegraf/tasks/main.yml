- ansible.builtin.import_tasks: install.yml
  tags:
    - telegraf
    - telegraf:install

- ansible.builtin.import_tasks: config.yml
  tags:
    - telegraf
    - telegraf:config

- ansible.builtin.import_tasks: plugin_docker.yml
  tags:
    - telegraf
    - telegraf:plugins
    - telegraf:plugins:docker
  when: telegraf_plugin_smartctl == true

- ansible.builtin.import_tasks: plugin_smartctl.yml
  tags:
    - telegraf
    - telegraf:plugins
    - telegraf:plugins:smartctl
  when: telegraf_plugin_smartctl == true

- ansible.builtin.import_tasks: plugin_zfs_pool_sizes.yml
  tags:
    - telegraf
    - telegraf:plugins
    - telegraf:plugins:zfs_pool_sizes
  when: telegraf_plugin_zfs_pool_sizes == true
