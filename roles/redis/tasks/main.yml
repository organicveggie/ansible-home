---
- name: "{{ redis_docker_role_label }} | Create Redis Docker volumes"
  community.docker.docker_volume:
    name: "{{ __redis_docker_volume_name }}"
  loop:
    - "{{ redis_docker_volume_data }}"
  loop_control:
    loop_var: __redis_docker_volume_name

- name: "{{ redis_docker_role_label }} | Set base Docker mount list"
  ansible.builtin.set_fact:
    _redis_docker_mount_list:
      - source: "{{ redis_docker_volume_data }}"
        target: "/data"
        type: "volume"

- name: "{{ redis_docker_role_label }} | Create placeholder array for default network"
  ansible.builtin.set_fact:
    _redis_docker_default_networks:
      - name: "{{ redis_docker_network }}"
        aliases: "{{ redis_docker_network_aliases | default(omit) }}"

- name: "{{ redis_docker_role_label }} | Define all Docker networks for this container"
  ansible.builtin.set_fact:
    _redis_docker_all_networks: >
      {{ _redis_docker_default_networks + redis_docker_extra_networks }}

- name: "{{ redis_docker_role_label }} | Define Docker labels"
  ansible.builtin.set_fact:
    _redis_docker_labels: "{{ _redis_docker_labels | default({}) |
      combine({__redis_docker_label.key: __redis_docker_label.value}) }}"
  with_items:
    - key: "traefik.enable"
      value: "{{ redis_docker_available_externally | string }}"
  loop_control:
    loop_var: __redis_docker_label

- name: "{{ redis_docker_role_label }} | Define base commands"
  ansible.builtin.set_fact:
    _redis_docker_cmds: "{{ _redis_docker_cmds | default([]) + [__redis_docker_cmd] }}"
  loop:
    - "redis-server"
    - "--loglevel"
    - "{{ redis_docker_config_loglevel }}"
  loop_control:
    loop_var: __redis_docker_cmd

- name: "{{ redis_docker_role_label }} | Enable AOF persistence"
  ansible.builtin.set_fact:
    _redis_docker_cmds: "{{ _redis_docker_cmds | default([]) + [__redis_docker_persist_aof_cmd] }}"
  loop:
    - "--appendonly"
    - "yes"
  loop_control:
    loop_var: __redis_docker_persist_aof_cmd
  when: "redis_docker_config_persist_appendonly"

- name: "{{ redis_docker_role_label }} | Enable RDB snapshot persistence"
  ansible.builtin.set_fact:
    _redis_docker_cmds: "{{ _redis_docker_cmds | default([]) + [__redis_docker_persist_rdb_cmd] }}"
  loop:
    - "--save"
    - "{{ redis_docker_config_persist_rdb_interval }}"
    - "{{ redis_docker_config_persist_rdb_writeops }}"
  loop_control:
    loop_var: __redis_docker_persist_rdb_cmd
  when: "redis_docker_config_persist_rdb"

- name: "{{ redis_docker_role_label }} | redis Docker Container"
  community.docker.docker_container:
    name: "{{ redis_docker_name }}"
    image: "{{ redis_docker_image }}:{{ redis_docker_image_version }}"
    pull: true
    mounts: "{{ _redis_docker_mount_list }}"
    network_mode: "{{ redis_docker_network }}"
    networks: "{{ _redis_docker_all_networks }}"
    command: "{{ _redis_docker_cmds }}"
    restart_policy: unless-stopped
    memory: "{{ redis_docker_memory }}"
    cpus: "{{ redis_docker_cpus }}"
    container_default_behavior: no_defaults
    auto_remove: no
    detach: yes
    init: no
    interactive: no
    paused: no
    privileged: no
    read_only: no
    tty: no
    labels: "{{ _redis_docker_labels }}"
