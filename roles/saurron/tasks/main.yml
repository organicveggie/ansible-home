---
- name: "{{ saurron_docker_role_label }} | Set default Docker mount list for volume mounts"
  ansible.builtin.set_fact:
    _saurron_docker_mount_list: []

- name: "{{ saurron_docker_role_label }} | Create Saurron Docker config volume"
  community.docker.docker_volume:
    name: "{{ saurron_docker_volume_config_name }}"

- name: "{{ saurron_docker_role_label }} | Set Docker mount list for config volume mount"
  ansible.builtin.set_fact:
    _saurron_docker_mount_list:
      - "source": "{{ saurron_docker_volume_config_name }}"
        "target": "/etc/saurron"
        "type": 'volume'
  
- name: "{{ saurron_docker_role_label }} | Get info on config volume"
  community.docker.docker_volume_info:
    name: "{{ saurron_docker_volume_config_name }}"
  register: "_saurron_docker_config_volume_info"

- name: "{{ saurron_docker_role_label }} | Create config file"
  ansible.builtin.template:
    src: "templates/saurron.toml.j2"
    dest: "{{ _saurron_docker_config_volume_info.volume.Mountpoint }}/saurron.toml"
    mode: "0640"
    owner: "{{ saurron_docker_uid }}"
    group: "{{ saurron_docker_gid }}"
  register: "_saurron_docker_config_file"

- name: "{{ saurron_docker_role_label }} | Setup Saurron Docker logs volume"
  block:
    - name: "{{ saurron_docker_role_label }} | Create Saurron Docker logs volume"
      community.docker.docker_volume:
        name: "{{ saurron_docker_volume_logs_name }}"

    - name: "{{ saurron_docker_role_label }} | Set Docker mount list for logs volume mount"
      ansible.builtin.set_fact:
        _saurron_docker_mount_list: |
          {{ _saurron_docker_mount_list + [{'source': saurron_docker_volume_logs_name, 'target': '/var/log/saurron', 'type': 'volume'}] }}

    - name: "{{ saurron_docker_role_label }} | Get info on logs volume"
      community.docker.docker_volume_info:
        name: "{{ saurron_docker_volume_logs_name }}"
      register: "_saurron_docker_logs_volume_info"
    
    - name: "{{ saurron_docker_role_label }} | Create logs directory and set permissions"
      ansible.builtin.file:
        path: "{{ _saurron_docker_logs_volume_info.volume.Mountpoint }}"
        state: "directory"
        owner: "{{ saurron_docker_uid }}"
        group: "{{ saurron_docker_gid }}"
        mode: "0750"
  when: "(saurron_docker_volume_logs_name is defined and saurron_docker_volume_logs_name | trim | length > 0) | ternary(true, false)"

- name: "{{ saurron_docker_role_label }} | Bind Docker socket"
  ansible.builtin.set_fact:
    _saurron_docker_mount_list: |
      {{ _saurron_docker_mount_list + [{'source': saurron_docker_bind_docker_socket, 'target': '/var/run/docker.sock', 'type': 'bind'}] }}
  when: "(saurron_docker_bind_docker_socket is defined and saurron_docker_bind_docker_socket | trim | length > 0) | ternary(true, false)"

- name: "{{ saurron_docker_role_label }} | Build container FQDN"
  ansible.builtin.set_fact:
    _saurron_docker_fqdn: "{{ saurron_docker_host_name }}.{{ saurron_docker_host_domain }}"

- name: "{{ saurron_docker_role_label }} | Create placeholder array for default network"
  ansible.builtin.set_fact:
    _saurron_docker_default_networks:
      - name: "{{ saurron_docker_network }}"
        aliases: "{{ saurron_docker_network_aliases | default(omit) }}"

- name: "{{ saurron_docker_role_label }} | Define all Docker networks for this container"
  ansible.builtin.set_fact:
    _saurron_docker_all_networks: >
      {{ _saurron_docker_default_networks + saurron_docker_extra_networks }}

- name: "{{ saurron_docker_role_label }} | Define Docker labels with Traefik disabled"
  ansible.builtin.set_fact:
    _saurron_docker_labels: "{{ _saurron_docker_labels | default({}) |
      combine({item.key: item.value}) }}"
  with_items:
    - key: "traefik.enable"
      value: "{{ saurron_available_externally }}"
  when: "not saurron_docker_available_externally"

- name: "{{ saurron_docker_role_label }} | Define Docker labels with Traefik enabled"
  ansible.builtin.set_fact:
    _saurron_docker_labels: "{{ _saurron_docker_labels | default({}) |
      combine({item.key: item.value}) }}"
  with_items:
    - key: "traefik.enable"
      value: "{{ saurron_docker_available_externally }}"
    - key: "traefik.docker.network"
      value: "{{ servarr_docker_network }}"
    - key: "traefik.http.routers.saurron.rule"
      value: "Host(`{{ _saurron_docker_fqdn }}`)"
    - key: "traefik.http.routers.saurron.entrypoints"
      value: "http,https"
    - key: "traefik.http.routers.saurron.tls.certresolver"
      value: "letsencrypt"
    - key: "traefik.http.routers.saurron.tls.domains[0].main"
      value: "*.{{ saurron_docker_host_domain }}"
    - key: "traefik.http.services.saurron.loadbalancer.server.port"
      value: "{{ saurron_docker_http_api_port }}"
  when: "saurron_docker_available_externally"

- name: "{{ saurron_docker_role_label }} | Define user-supplied extra Docker labels"
  ansible.builtin.set_fact:
    _saurron_docker_labels: "{{ _saurron_docker_labels | default({}) |
      combine({item.key: item.value}) }}"
  loop: "{{ saurron_docker_extra_labels | dict2items }}"

- name: "{{ saurron_docker_role_label }} | Define default Docker environment variables"
  ansible.builtin.set_fact:
    _saurron_docker_env_vars:
      "SAURRON_CONFIG": "/etc/saurron/saurron.toml"

- name: "{{ saurron_docker_role_label }} | Define user-supplied extra Docker environment variables"
  ansible.builtin.set_fact:
    _saurron_docker_env_vars: "{{ _saurron_docker_env_vars | default({}) |
      combine({item.key: item.value}) }}"
  loop: "{{ saurron_docker_extra_env | dict2items }}"

- name: "{{ saurron_docker_role_label }} | Create Docker Container"
  community.docker.docker_container:
    name: "{{ saurron_docker_name }}"
    image: "{{ saurron_docker_image_name }}:{{ saurron_docker_image_version }}"
    pull: true
    env: "{{ _saurron_docker_env_vars }}"
    mounts: "{{ _saurron_docker_mount_list }}"
    network_mode: "{{ saurron_docker_network }}"
    networks: "{{ _saurron_docker_all_networks }}"
    etc_hosts: "{{ saurron_docker_extra_hosts | default(omit) }}"
    restart_policy: unless-stopped
    restart: "{{ _saurron_docker_config_file.changed | default(false) }}"
    memory: "{{ saurron_docker_memory }}"
    cpus: "{{ saurron_docker_cpus }}"
    container_default_behavior: no_defaults
    auto_remove: no
    detach: yes
    init: yes
    interactive: no
    paused: no
    privileged: no
    read_only: no
    user: "{{ saurron_docker_uid }}:{{ saurron_docker_gid }}"
    tty: no
    labels: "{{ _saurron_docker_labels }}"
