---
driver:
  name: docker

platforms:
  - name: instance
    image: "ghcr.io/organicveggie/docker-ansible:py3.14-noble-latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /tmp
      - /run
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_ROLES_PATH: "$MOLECULE_EPHEMERAL_DIRECTORY/roles:${HOME}/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:$MOLECULE_PROJECT_DIRECTORY/.."
    # The docker-outside-of-docker devcontainer feature uses socat to proxy traffic to Docker.
    # Unfortunately, socat 1.8.0+ (used by docker-outside-of-docker) has a ~500ms inactivity
    # timeout that silently kills docker exec connections, causing Ansible module output to be lost.
    # Bypass the socat proxy and go directly to Docker.
    DOCKER_HOST: "unix:///var/run/docker-host.sock"
  config_options:
    defaults:
      pipelining: false            # Disables STDIN streaming
      remote_tmp: /tmp/.ansible    # Moves the execution directory out of /root

verifier:
  name: ansible
