---
#####
# Container settings
#####

# Name of the Docker container.
hass_otbr_name: "hass-otbr"

# Base name of the Docker image to use for the container.
hass_otbr_image_name: "ghcr.io/ownbee/hass-otbr-docker"

# Specific Docker image version to use for the container.
hass_otbr_image_version: "latest"

# Number of vCPUs to allocate to the container.
hass_otbr_cpus: "1"

# Amount of memory to allocate to the container.
hass_otbr_memory: "512MB"

# TCP port number for REST API used by Home Assistant.
hass_otbr_rest_port: "8081"

# TCP port number for web interface.
hass_otbr_web_port: "7586"

# Dictionary of extra key value pairs to set as labels on the Docker container.
hass_otbr_extra_labels: {}

# Dictionary of extra key value pairs to set as environment variables on the Docker container.
hass_otbr_extra_env: {}

# Dict of host-to-IP mappings, where each host name is a key in the dictionary. Each host name will
# be added to the container's /etc/hosts file.
# Instead of an IP address, the special value host-gateway can also be used, which resolves to the
# host's gateway IP and allows containers to connect to services running on the host.
hass_otbr_extra_hosts: {}

# Name of the primary network.
hass_otbr_network_name: null

# Container aliases on the default network.
hass_otbr_network_aliases: null

# List of additional networks to join.
hass_otbr_extra_networks: []

# Name of the Docker volume to create to store data files. 
hass_otbr_volume_data_name: "hass-otbr-data"

#####
# OpenThread Border Router (OTBR) settings
#####

# Matter/Thread USB stick device path. Example: "/dev/serial/by-id/usb-1234_5678-if00"
hass_otbr_device: null

# Serial port baudrate (depends on firmware).
hass_otbr_device_baudrate: "460800"

# If hardware flow control should be enabled (depends on firmware)
hass_otbr_device_flow_control: false

# Automatically install/update firmware (Home Assistant SkyConnect/Yellow)
hass_otbr_auto_update_firmware: false

# Set the log level of the OpenThread BorderRouter Agent
# (debug, info, notice, warning, error, critical, alert, emergency)
hass_otbr_log_level: "info"

# Enable OpenThread Border Router firewall to block unnecessary traffic
hass_otbr_enable_firewall: false

# Enable or disable the Web UI.
hass_otbr_enable_webui: true

# Enable NAT64 to allow Thread devices accessing IPv4 addresses
hass_otbr_enable_nat64: false

# Host network interface to use (e.g. eth0, wlan0, enp3s0)
hass_otbr_host_backbone_if: null

# Enable Thread 1.4 (beta)
hass_otbr_enable_thread_1_4: false

#####
# Ansible
#####

hass_otbr_role_label: "hass-otbr"
