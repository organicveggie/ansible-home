---
- name: Install dependencies
  hosts: all
  become: true

  vars:
    pip_install_packages:
      - name: docker
    docker_daemon_options:
      storage-driver: "vfs"

  pre_tasks:
    - name: Wait for systemd to complete initialization
      ansible.builtin.command: systemctl is-system-running
      register: systemctl_status
      until: >
        'running' in systemctl_status.stdout or
        'degraded' in systemctl_status.stdout
      retries: 30
      delay: 5
      when: ansible_facts["service_mgr"] == 'systemd'
      changed_when: false
      failed_when: systemctl_status.rc > 1

  roles:
    - geerlingguy.pip
    - geerlingguy.docker

- name: Converge
  hosts: all
  become: true

  vars:
    hass_otbr_name: "hass-otbr-test"
    hass_otbr_device: "/dev/ttyUSB0"
    hass_otbr_network_name: "hass-test"
    hass_otbr_host_backbone_if: "eth0"
    hass_otbr_volume_data_name: "hass-otbr-data-test"

  pre_tasks:
    - name: Create Docker network
      community.docker.docker_network:
        name: hass-test
        state: present

  roles:
    - role: HA-OTBR
