---
- name: Verify
  hosts: all
  gather_facts: false

  vars:
    zwavejsui_name: "zwavejsui-container-test"
    zwavejsui_volume_name: "zwavejsui-volume-test"

  tasks:
    - name: Get info on data volume
      community.docker.docker_volume_info:
        name: "{{ zwavejsui_volume_name }}"
      register: data_vol_info

    - name: Verify data volume exists
      ansible.builtin.assert:
        that: data_vol_info.exists

    - name: Get info on ZwaveJSUI container
      community.docker.docker_container_info:
        name: "{{ zwavejsui_name }}"
      register: container_info

    - name: Verify container exists
      ansible.builtin.assert:
        that: container_info.exists
