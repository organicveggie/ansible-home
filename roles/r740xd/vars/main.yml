---
# vars file for r740xd
r740xd_extra_packages:
  - "smartmontools"
  - "htop"
  - "zfsutils-linux"
  - "bonnie++"
  - "unzip"
  - "lm-sensors"
  # TODO: https://github.com/bcicen/ctop?tab=readme-ov-file#install
  # - "ctop"
  - "mbuffer"
  - "net-tools"
  - "screen"
  - "tmux"

###
### Bazarr
### 1
r740xd_bazarr1080_config_volume_name: "bazarr1080-config"
r740xd_bazarr1080_container_name: "bazarr1080"
r740xd_bazarr1080_host_name: "bazarr1080"
r740xd_bazarr1080_network_aliases:
  - "bazarr1080"
r740xd_bazarr4k_config_volume_name: "bazarr4k-config"
r740xd_bazarr4k_container_name: "bazarr4k"
r740xd_bazarr4k_host_name: "bazarr4k"
r740xd_bazarr4k_network_aliases:
  - "bazarr4k"

###
### Calibre Web
###
r740xd_calibre_web_username: "calibre"
r740xd_calibre_web_groupname: "calibre"

###
### Diun
###
r740xd_diun_group: "diun"
r740xd_diun_uid: 2450
r740xd_diun_user: "diun"

###
### Docker
###
r740xd_docker_bridge_network_gateway: "172.17.0.1"

###
### Home Assistant
###
r740xd_hass_pgsql_image: "postgres:15-bullseye"
r740xd_hass_pgsql_name: "hass-pgsql"
r740xd_hass_pgsql_volume_conf_name: "hass-pgsql-conf"
r740xd_hass_pgsql_volume_data_name: "hass-pgsql-data"
r740xd_hass_pgsql_volume_init_name: "hass-pgsql-initscripts"

###
### InfluxDB
###
r740xd_influxdb_config_volume_name: "influxdb27-config"
r740xd_influxdb_data_volume_name: "influxdb27-data"

###
### Kometa
###
r740xd_kometa_mdblist_cache_expiration: "60"
r740xd_kometa_plex_db_cache: "2048" # MB
r740xd_kometa_run_time: "02:00"
r740xd_kometa_tmdb_language: "en"
r740xd_kometa_tmdb_region: "US"

###
### Navidrome
###
r740xd_navidrome_image_cache_size: "500MB"

###
### Plex
###
r740xd_plex_gid: 32400
r740xd_plex_groupname: "plex"
r740xd_plex_port: 32400
r740xd_plex_uid: 32400
r740xd_plex_username: "plex"

