###
### TimeMachine
###
r740xd_time_machine_docker_name: "time-machine"
r740xd_time_machine_workgroup: "TMWORKGROUP"

###
### Traefik
###
r740xd_traefik_http_ports:
  - '80:80'
  - '443:443'
r740xd_traefik_zwavejsui_entrypoints:
  zwavejsui:
    address: ":3000"
r740xd_traefik_emqx_entrypoints:
  emqx:
    address: ":1883"
  emqx_ws:
    address: ":9001"
r740xd_traefik_syncthings_entrypoints:
  syncthing_tcp:
    address: ":22000"
  syncthing_udp:
    address: ":22000/udp"
r740xd_traefik_syncthings_ports:
  - "22000:22000"
r740xd_traefik_unific_entrypoints:
  java_http:
    address: ":8080"
  unific_speed_test:
    address: ":6789"
  unific_stun:
    address: ":3478/udp"
  unific_dev_discovery:
    address: ":10001/udp"
  unific_controller_discovery:
    address: ":19000/udp"
r740xd_traefik_unific_ports:
  - "3478:3478"     # unific stun
  - "8080:8080"     # unific java http
  - "10001:10001"   # unific dev discovery
  - "19000:19000"   # unific controller discovery
