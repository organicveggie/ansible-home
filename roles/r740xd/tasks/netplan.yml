---
- name: "R740xd | Configure netplan"
  ansible.builtin.import_role:
    name: "netplan"
  vars:
    netplan_interfaces:
      - "eno1"
      - "eno2"
      - "eno3"
      - "eno4"
    netplan_bonds:
      bond0:
        dhcp4: true
        interfaces:
          - "eno1"
          - "eno2"
          - "eno3"
          - "eno4"
        addresses: ["192.168.25.50/24"]
        routes:
          - to: "default"
            via: "192.168.25.1"
        nameservers:
          addresses:
            - "192.168.25.1"
            - "8.8.8.8"
        parameters:
          lacp-rate: "fast"
          mode: "802.3ad"
          transmit-hash-policy: "layer2"
    netplan_vlans:
      # IOT vlan
      bond0.50:
        id: 50
        link: "bond0"
        addresses: ["192.168.150.50/24"]
        nameservers:
          addresses:
            - "8.8.8.8"
            - "8.8.4.4"
