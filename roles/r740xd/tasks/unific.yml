---
- name: "unific | Setup Docker network"
  community.docker.docker_network:
    name: "{{ docker_networks.unific.name }}"
    driver: "bridge"
    enable_ipv6: "no"
    internal: "no"
    scope: "local"
    ipam_config:
      - subnet: "{{ docker_networks.unific.subnet }}"
        gateway: "{{ docker_networks.unific.gateway }}"

- name: "unific | Setup UniFi Controller container"
  ansible.builtin.import_role:
    name: "organicveggie.unific"
  vars:
    unific_available_externally: "true"
    unific_cpus: "{{ r740xd_unific_cpus }}"
    unific_docker_network_created: true
    unific_hostname: "{{ r740xd_unific_hostname }}"
    unific_host_domain: "{{ r740xd_unific_host_domain }}"
    unific_memory: "{{ r740xd_unific_memory }}"
    unific_network_name: "{{ docker_networks.unific.name }}"
    unific_timezone: "{{ r740xd_timezone }}"
    unific_traefik_router_rule: "Host(`{{ r740xd_unific_hostname }}.{{ r740xd_unific_host_domain }}`)"
