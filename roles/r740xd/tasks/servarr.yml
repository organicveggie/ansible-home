---
- name: "{{ r740xd_ansible_role_label }} | servarr | Set group id"
  ansible.builtin.set_fact:
    _r740xd_servarr_gid: "{{ r740xd_servarr_gid | default(r740xd_servarr_uid) }}"
  tags:
    - "setup"
    - "bazarr"
    - "bazarr1080"
    - "bazarr4k"
    - "cross-seed"
    - "lidarr"
    - "prowlarr"
    - "radarr"
    - "radarr1080"
    - "radarr4k"
    - "readarr"
    - "sabnzbd"
    - "sonarr"
    - "sonarr1080"
    - "sonarr4k"
    - "syncthing"
    - "unpackerr"

- name: "{{ r740xd_ansible_role_label }} | servarr | Set group name"
  ansible.builtin.set_fact:
    _r740xd_servarr_groupname: "{{ r740xd_servarr_groupname | default(r740xd_servarr_username) }}"
  tags:
    - "setup"
    - "cross-seed"
    - "lidarr"
    - "prowlarr"
    - "radarr"
    - "readarr"
    - "sabnzbd"
    - "sonarr"
    - "syncthing"
    - "unpackerr"

- name: "{{ r740xd_ansible_role_label }} | servarr | Create group"
  ansible.builtin.group:
    name: "{{ _r740xd_servarr_groupname }}"
    gid: "{{ _r740xd_servarr_gid }}"
  tags: ["setup"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Create user"
  ansible.builtin.user:
    name: "{{ r740xd_servarr_username }}"
    uid: "{{ r740xd_servarr_uid }}"
    create_home: "false"
    groups: "{{ _r740xd_servarr_groupname }}"
    password: "!"
  tags: ["setup"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Create ZFS datasets"
  community.general.zfs:
    name: "{{ __item }}"
    state: present
  loop:
    - "{{ r740xd_servarr_zfs_dataset }}"
    - "{{ r740xd_servarr_zfs_dataset }}/downloads"
    - "{{ r740xd_servarr_zfs_dataset }}/downloads/torrents"
    - "{{ r740xd_servarr_zfs_dataset }}/downloads/usenet"
  loop_control:
    loop_var: __item
  tags: ["setup", "zfs"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Set owner/group for datasets"
  ansible.builtin.file:
    path: "{{ __item }}"
    state: "directory"
    owner: "{{ r740xd_servarr_username }}"
    group: "{{ _r740xd_servarr_groupname }}"
    mode: "775"
  loop:
    - "{{ r740xd_servarr_path }}"
    - "{{ r740xd_servarr_path }}/downloads"
    - "{{ r740xd_servarr_path }}/downloads/torrents"
    - "{{ r740xd_servarr_path }}/downloads/usenet"
  loop_control:
    loop_var: __item
  tags: ["setup", "zfs"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Create folders for downloads"
  ansible.builtin.file:
    path: "{{ __item }}"
    state: "directory"
    owner: "{{ r740xd_servarr_username }}"
    group: "{{ _r740xd_servarr_groupname }}"
    mode: "775"
  loop:
    - "{{ r740xd_servarr_path }}/downloads/torrents/completed"
    - "{{ r740xd_servarr_path }}/downloads/usenet/completed"
    - "{{ r740xd_servarr_path }}/downloads/usenet/movies"
    - "{{ r740xd_servarr_path }}/downloads/usenet/movies/1080p"
    - "{{ r740xd_servarr_path }}/downloads/usenet/movies/2160p"
    - "{{ r740xd_servarr_path }}/downloads/usenet/tv"
    - "{{ r740xd_servarr_path }}/downloads/usenet/tv/1080p"
    - "{{ r740xd_servarr_path }}/downloads/usenet/tv/2160p"
  loop_control:
    loop_var: __item
  tags: ["setup", "zfs"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Docker network"
  community.docker.docker_network:
    name: "{{ docker_networks.servarr.name }}"
    driver: "bridge"
    enable_ipv6: "no"
    internal: "no"
    scope: "local"
    ipam_config:
      - subnet: "{{ docker_networks.servarr.subnet }}"
        gateway: "{{ docker_networks.servarr.gateway }}"
  tags: ["setup", "network"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Cross-Seed"
  ansible.builtin.import_tasks:
    file: "servarr_cross_seed.yml"
  vars:
    cross_seed_script_owner: "{{ r740xd_servarr_uid }}"
    cross_seed_script_group: "{{ _r740xd_servarr_gid }}"
    cross_seed_xseed_torrent_clients: ["ultra-qbit-yukon"]
    cross_seed_xseed_usenet_clients: ["SABnzbd"]
  tags: ["cross-seed", "cross_seed", "crossseed"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Calibre Docker"
  ansible.builtin.import_role:
    name: "calibre_docker"
  vars:
    calibre_docker_gid: "{{ _r740xd_servarr_gid }}"
    calibre_docker_uid: "{{ r740xd_servarr_uid }}"
    calibre_docker_timezone: "{{ r740xd_timezone }}"
    calibre_docker_network: "{{ docker_networks.servarr.name }}"
    calibre_docker_data_source_path: "{{ r740xd_servarr_path }}"
    calibre_docker_trusted_ips: "{{ docker_networks.servarr.subnet }}"
  tags: ["setup", "calibre"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Flaresolverr"
  ansible.builtin.import_role:
    name: "flaresolverr"
  vars:
    flaresolverr_docker_timezone: "{{ r740xd_timezone }}"
    flaresolverr_docker_network: "{{ docker_networks.servarr.name }}"
  tags: ["flaresolverr"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Lidarr"
  ansible.builtin.import_role:
    name: "lidarr"
  vars:
    lidarr_docker_cpus: "{{ r740xd_lidarr_cpus }}"
    lidarr_docker_data_source_path: "{{ r740xd_servarr_path }}"
    lidarr_docker_gid: "{{ _r740xd_servarr_gid }}"
    lidarr_docker_host_domain: "{{ r740xd_lidarr_host_domain }}"
    lidarr_docker_network: "{{ docker_networks.servarr.name }}"
    lidarr_docker_timezone: "{{ r740xd_timezone }}"
    lidarr_docker_uid: "{{ r740xd_servarr_uid }}"
    lidarr_docker_extra_bind_mounts:
      - source: "/nas-mirror/music"
        target: "/data/music"
  tags: ["lidarr"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup prowlarr"
  ansible.builtin.import_role:
    name: "prowlarr"
  vars:
    prowlarr_docker_gid: "{{ _r740xd_servarr_gid }}"
    prowlarr_docker_host_domain: "{{ r740xd_prowlarr_host_domain }}"
    prowlarr_docker_network: "{{ docker_networks.servarr.name }}"
    prowlarr_docker_timezone: "{{ r740xd_timezone }}"
    prowlarr_docker_uid: "{{ r740xd_servarr_uid }}"
  tags: ["prowlarr"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Radarr 1080p"
  ansible.builtin.import_role:
    name: "radarr"
  vars:
    radarr_docker_role_label: "radarr1080"
    radarr_docker_available_externally: "true"
    radarr_docker_cpus: "{{ r740xd_radarr_cpus }}"
    radarr_docker_data_source_path: "{{ r740xd_servarr_path }}"
    radarr_docker_extra_mounts:
      - source: "/opt/xseed"
        target: "/xseed"
        type: "bind"
    radarr_docker_gid: "{{ _r740xd_servarr_gid }}"
    radarr_docker_host_domain: "{{ r740xd_radarr1080_host_domain }}"
    radarr_docker_host_name: "{{ r740xd_radarr1080_host_name }}"
    radarr_docker_movie_source_path: "{{ r740xd_servarr_movie_source_path }}"
    radarr_docker_name: "{{ r740xd_radarr1080_container_name }}"
    radarr_docker_network: "{{ docker_networks.servarr.name }}"
    radarr_docker_network_aliases: "{{ r740xd_radarr1080_network_aliases }}"
    radarr_docker_timezone: "{{ r740xd_timezone }}"
    radarr_docker_uid: "{{ r740xd_servarr_uid }}"
    radarr_docker_volume_config_name: "{{ r740xd_radarr1080_config_volume_name }}"
    radarr_docker_web_port: "{{ r740xd_radarr_web_port | default(omit) }}"
  tags: ["radarr"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Radarr 4K"
  ansible.builtin.import_role:
    name: "radarr"
  vars:
    radarr_docker_role_label: "radarr4k"
    radarr_docker_available_externally: "true"
    radarr_docker_cpus: "{{ r740xd_radarr_cpus }}"
    radarr_docker_data_source_path: "{{ r740xd_servarr_path }}"
    radarr_docker_extra_mounts:
      - source: "/opt/xseed"
        target: "/xseed"
        type: "bind"
    radarr_docker_gid: "{{ _r740xd_servarr_gid }}"
    radarr_docker_host_domain: "{{ r740xd_radarr4k_host_domain }}"
    radarr_docker_host_name: "{{ r740xd_radarr4k_host_name }}"
    radarr_docker_movie_source_path: "{{ r740xd_servarr_movie_source_path }}"
    radarr_docker_name: "{{ r740xd_radarr4k_container_name }}"
    radarr_docker_network: "{{ docker_networks.servarr.name }}"
    radarr_docker_network_aliases: "{{ r740xd_radarr4k_network_aliases }}"
    radarr_docker_timezone: "{{ r740xd_timezone }}"
    radarr_docker_uid: "{{ r740xd_servarr_uid }}"
    radarr_docker_volume_config_name: "{{ r740xd_radarr4k_config_volume_name }}"
    radarr_docker_web_port: "{{ r740xd_radarr_web_port | default(omit) }}"
  tags: ["radarr"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Readarr"
  ansible.builtin.import_role:
    name: "readarr"
  vars:
    readarr_docker_data_source_path: "{{ r740xd_servarr_path }}"
    readarr_docker_extra_mounts:
      - source: "{{ r740xd_readarr_library_path }}"
        target: "/data/books"
        type: "bind"
    readarr_docker_gid: "{{ _r740xd_servarr_gid }}"
    readarr_docker_host_domain: "{{ r740xd_readarr_host_domain }}"
    readarr_docker_host_name: "{{ r740xd_readarr_host_name }}"
    readarr_docker_network: "{{ docker_networks.servarr.name }}"
    readarr_docker_timezone: "{{ r740xd_timezone }}"
    readarr_docker_uid: "{{ r740xd_servarr_uid }}"
    readarr_docker_web_port: "{{ r740xd_readarr_web_port }}"
  tags: ["readarr"]

