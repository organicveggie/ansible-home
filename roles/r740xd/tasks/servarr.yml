  tags: ["bazarr", "bazarr4k"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Logrotate"
  ansible.builtin.include_tasks:
    file: "servarr_logrotate.yml"
  vars:
    servarr_logrotate_name: "{{ __item.name }}"
    servarr_logrotate_volume_name: "{{ __item.volume }}"
    servarr_logrotate_log_criteria: "*.txt"
    servarr_logrotate_max_age: "{{ __item.max_age | default('+8d') }}"
  loop:
    - name: "lidarr"
      volume: "{{ lidarr_docker_volume_config_name }}"
    - name: "radarr1080p"
      volume: "{{ r740xd_radarr1080_config_volume_name }}"
    - name: "radarr4k"
      volume: "{{ r740xd_radarr4k_config_volume_name }}"
    - name: "readarr"
      volume: "{{ readarr_docker_volume_config_name }}"
    - name: "sabnzbd"
      volume: "{{ sabnzbd_docker_volume_config_name }}"
      max_age: "+30d"
    - name: "sonarr1080p"
      volume: "{{ r740xd_sonarr1080_config_volume_name }}"
    - name: "sonarr4k"
      volume: "{{ r740xd_sonarr4k_config_volume_name }}"
  loop_control:
    loop_var: __item
  tags: ["logrotate"]
