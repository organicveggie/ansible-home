- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Syncthing"
  ansible.builtin.import_role:
    name: "syncthing"
  vars:
    syncthing_available_externally: "true"
    syncthing_docker_data_source_path: "{{ r740xd_servarr_path }}"
    syncthing_docker_host_domain: "{{ r740xd_syncthing_host_domain }}"
    syncthing_docker_gid: "{{ _r740xd_servarr_gid }}"
    syncthing_docker_network: "{{ docker_networks.servarr.name }}"
    syncthing_docker_timezone: "{{ r740xd_timezone }}"
    syncthing_docker_uid: "{{ r740xd_servarr_uid }}"
  tags: ["syncthing"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Unpackerr"
  ansible.builtin.import_role:
    name: "unpackerr"
  vars:
    unpackerr_docker_gid: "{{ _r740xd_servarr_gid }}"
    unpackerr_docker_uid: "{{ r740xd_servarr_uid }}"
    unpackerr_docker_timezone: "{{ r740xd_timezone }}"
    unpackerr_docker_network: "{{ docker_networks.servarr.name }}"
    unpackerr_docker_data_source_path: "{{ r740xd_servarr_path }}"
    unpackerr_docker_web_upstreams:
      - "{{ docker_networks.servarr.gateway }}"
      - "{{ docker_networks.servarr.subnet }}"
    unpackerr_docker_radarr:
      - url: "http://{{ r740xd_radarr1080_host_name }}:{{ r740xd_radarr_web_port }}"
        api_key: "{{ r740xd_radarr1080_api_key }}"
        paths:
          - "/data/downloads"
        protocols: "torrent,usenet"
        timeout: "10s"
        delete_delay: "5m"
        delete_orig: false
        syncthing: true
      - url: "http://{{ r740xd_radarr4k_host_name }}:{{ r740xd_radarr_web_port }}"
        api_key: "{{ r740xd_radarr4k_api_key }}"
        paths:
          - "/data/downloads"
        protocols: "torrent,usenet"
        timeout: "10s"
        delete_delay: "5m"
        delete_orig: false
        syncthing: true
    unpackerr_docker_readarr:
      - url: "http://{{ r740xd_readarr_host_name }}:{{ r740xd_readarr_web_port }}"
        api_key: "{{ r740xd_readarr_api_key }}"
        paths:
          - "/data/downloads"
        protocols: "torrent,usenet"
        timeout: "10s"
        delete_delay: "5m"
        delete_orig: false
        syncthing: true
    unpackerr_docker_sonarr:
      - url: "http://{{ r740xd_sonarr1080_host_name }}:{{ r740xd_sonarr_web_port }}"
        api_key: "{{ r740xd_sonarr1080_api_key }}"
        paths:
          - "/data/downloads"
        protocols: "torrent,usenet"
        timeout: "10s"
        delete_delay: "5m"
        delete_orig: false
        syncthing: true
      - url: "http://{{ r740xd_sonarr4k_host_name }}:{{ r740xd_sonarr_web_port }}"
        api_key: "{{ r740xd_sonarr4k_api_key }}"
        paths:
          - "/data/downloads"
        protocols: "torrent,usenet"
        timeout: "10s"
        delete_delay: "5m"
        delete_orig: false
        syncthing: true
  tags: ["unpackerr"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Cloudflared"
  ansible.builtin.import_role:
    name: "cloudflared_docker"
  vars:
    cloudflared_docker_name: "{{ r740xd_servarr_cloudflared_container_name }}"
    cloudflared_docker_tunnel_token: "{{ r740xd_servarr_cloudflared_token }}"
    cloudflared_docker_network: "{{ docker_networks.servarr.name }}"
  tags: ["cloudflare", "cloudflared"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Bazarr 1080p"
  ansible.builtin.import_role:
    name: "bazarr"
  vars:
    bazarr_docker_cpus: "{{ r740xd_bazarr_cpus }}"
    bazarr_docker_gid: "{{ _r740xd_servarr_gid }}"
    bazarr_docker_host_domain: "{{ r740xd_bazarr1080_host_domain }}"
    bazarr_docker_host_name: "{{ r740xd_bazarr1080_host_name }}"
    bazarr_docker_memory: "{{ r740xd_bazarr_memory }}"
    bazarr_docker_movie_source_path: "{{ r740xd_servarr_movie_source_path }}/1080p"
    bazarr_docker_name: "{{ r740xd_bazarr1080_container_name }}"
    bazarr_docker_network_aliases: "{{ r740xd_bazarr1080_network_aliases }}"
    bazarr_docker_role_label: "bazarr1080"
    bazarr_docker_tv_source_path: "{{ r740xd_servarr_tv_source_path }}/1080p"
    bazarr_docker_uid: "{{ r740xd_servarr_uid }}"
    bazarr_docker_web_port: "{{ r740xd_bazarr_web_port }}"
  tags: ["bazarr", "bazarr1080"]

- name: "{{ r740xd_ansible_role_label }} | servarr | Setup Bazarr 4K"
  ansible.builtin.import_role:
    name: "bazarr"
  vars:
    bazarr_docker_cpus: "{{ r740xd_bazarr_cpus }}"
    bazarr_docker_gid: "{{ _r740xd_servarr_gid }}"
    bazarr_docker_host_domain: "{{ r740xd_bazarr4k_host_domain }}"
    bazarr_docker_host_name: "{{ r740xd_bazarr4k_host_name }}"
    bazarr_docker_memory: "{{ r740xd_bazarr_memory }}"
    bazarr_docker_movie_source_path: "{{ r740xd_servarr_movie_source_path }}/2160p"
    bazarr_docker_name: "{{ r740xd_bazarr4k_container_name }}"
    bazarr_docker_network_aliases: "{{ r740xd_bazarr4k_network_aliases }}"
    bazarr_docker_role_label: "bazarr4k"
    bazarr_docker_tv_source_path: "{{ r740xd_servarr_tv_source_path }}/2160p"
    bazarr_docker_uid: "{{ r740xd_servarr_uid }}"
