---
- name: "{{ r740xd_ansible_role_label }} | servarr | {{ servarr_logrotate_name }} logrotate"
  block:
    - name: "{{ r740xd_ansible_role_label }} | servarr | Get {{ servarr_logrotate_name }} container volume"
      community.docker.docker_volume_info:
        name: "{{ servarr_logrotate_volume_name }}"
      register: "_r740xd_servarr_logrotate_volume_info"

    - name: "{{ r740xd_ansible_role_label }} | servarr | Get {{ servarr_logrotate_name }} container volume path"
      ansible.builtin.set_fact:
        _r740xd_servarr_logrotate_log_path: "{{ _r740xd_servarr_logrotate_volume_info['volume']['Mountpoint'] }}/logs"
      when: "_r740xd_servarr_logrotate_volume_info.exists | default(false)"

    - name: "{{ r740xd_ansible_role_label }} | servarr | Configure logrotate for {{ servarr_logrotate_name }}"
      ansible.builtin.import_role: 
        name: "nickhammond.logrotate"
      vars:
        logrotate_scripts:
          - name: "{{ servarr_logrotate_name }}"
            path: "{{ _r740xd_servarr_logrotate_log_path }}/{{ servarr_logrotate_log_criteria }}"
            options:
              - "daily"
              - "missingok"
              - "nomail"
              - "postrotate"
              - "  /usr/bin/find {{ _r740xd_servarr_logrotate_log_path }} -name \"*.txt\" -type f -mtime {{ servarr_logrotate_max_age }} -exec rm -f {} \\;"
              - "endscript"
      when: "_r740xd_servarr_logrotate_volume_info.exists | default(false)"
