---
- name: "kometa | Build Tautulli URL"
  ansible.builtin.set_fact:
    _kometa_tautulli_url: "http://{{ nas_tautulli_hostname }}:{{ nas_tautulli_web_port }}"

- name: "kometa | Setup Kometa container"
  ansible.builtin.import_role:
    name: "kometa"
  vars:
    kometa_docker_config_read_only: "true"
    kometa_docker_cpus: "{{ kometa_cpus }}"
    kometa_docker_extra_networks:
      - name: "{{ docker_networks.kometa.name }}"
      - name: "{{ docker_networks.tautulli.name | default(omit) }}"
    kometa_docker_global_save_report: "{{ kometa_global_save_report }}"
    kometa_docker_libraries: "{{ kometa_libraries | default(omit) }}"
    kometa_docker_mdblist_apikey: "{{ vault_kometa_mdblist_apikey }}"
    kometa_docker_mdblist_cache_expiration: "{{ kometa_mdblist_cache_expiration }}"
    kometa_docker_memory: "{{ kometa_memory }}"
    kometa_docker_network: "{{ docker_networks.kometa.name }}"
    kometa_docker_network_create: "false"
    kometa_docker_plex_db_cache: "{{ kometa_plex_db_cache }}" # MB
    kometa_docker_plex_token: "{{ vault_kometa_plex_token }}"
    kometa_docker_plex_url: "{{ vault_kometa_plex_url }}"
    kometa_docker_run_once_only: "{{ kometa_run_once_only | default(false) }}"
    kometa_docker_run_time: "{{ kometa_run_time }}"
    kometa_docker_timezone: "{{ kometa_timezone }}"
    kometa_docker_tautulli_apikey: "{{ vault_kometa_tautulli_apikey }}"
    kometa_docker_tautulli_url: "{{ _kometa_tautulli_url }}"
    kometa_docker_tmdb_language: "{{ kometa_tmdb_language }}"
    kometa_docker_tmdb_region: "{{ kometa_tmdb_region }}"
    kometa_docker_tmdb_apikey: "{{ vault_kometa_tmdb_apikey }}"
    kometa_docker_trakt: "{{ kometa_trakt | default(omit) }}"
