---
- name: "traefik | Define fqdn"
  ansible.builtin.set_fact:
    _r740xd_traefik_fqdn: "traefik.{{ veggie_nas_domain_name }}"

###
### Configure additional networks, ports, and entrypoints
###
- name: "traefik | Process extra networks"
  ansible.builtin.include_tasks:
    file: "traefik_network.yml"
  loop:
    # - "{{ docker_networks.traefik.name }}"
    - "{{ docker_networks.glances.name }}"
    - "{{ docker_networks.influxdb.name }}"
    - "{{ docker_networks.navidrome.name }}"
    - "{{ docker_networks.node_red.name }}"
    - "{{ docker_networks.saurron.name }}"
    - "{{ docker_networks.seerr.name }}"
    - "{{ docker_networks.portainer.name }}"
    - "{{ docker_networks.tautulli.name }}"
    - "{{ docker_networks.prometheus.name }}"
  loop_control:
    loop_var: __item

- name: "traefik | Process Servarr network"
  when: "docker_networks.servarr.name | default('') | trim | length > 0"
  block:
    - name: "traefik | Check if Servarr network exists"
      community.docker.docker_network_info:
        name: "{{ docker_networks.servarr.name }}"
      register: "_r740xd_traefik_servarr_network_info"

    - name: "traefik | Configure for Servarr tools"
      when: "_r740xd_traefik_servarr_network_info.exists"
      block:
        - name: "traefik | Enable Servarr extra network"
          ansible.builtin.set_fact:
            _r740xd_traefik_extra_networks: "{{ _r740xd_traefik_extra_networks | default([]) + [{'name': docker_networks.servarr.name}] }}"

        - name: "traefik | Enable SyncThings (Servarr) ports"
          ansible.builtin.set_fact:
            _r740xd_traefik_extra_ports: "{{ _r740xd_traefik_extra_ports | default([]) + r740xd_traefik_syncthings_ports }}"
        
        - name: "traefik | Enable SyncThings (Servarr) entrypoints"
          ansible.builtin.set_fact:
            _r740xd_traefik_entrypoints: "{{ _r740xd_traefik_entrypoints | default({}) | combine(r740xd_traefik_syncthings_entrypoints) }}"

- name: "traefik | Process UniFi Controller network"
  when: "docker_networks.unific.name | default('') | trim | length > 0"
  block:
    - name: "traefik | Check if UniFi Controller network exists"
      community.docker.docker_network_info:
        name: "{{ docker_networks.unific.name }}"
      register: "_r740xd_traefik_unific_network_info"

    - name: "traefik | Configure Traefik for UniFi Controller"
      when: "_r740xd_traefik_unific_network_info.exists"
      block:
        - name: "traefik | Enable UniFi extra network"
          ansible.builtin.set_fact:
            _r740xd_traefik_extra_networks: "{{ _r740xd_traefik_extra_networks | default([]) + [{'name': docker_networks.unific.name}] }}"

        - name: "traefik | Enable UniFi Controlller ports"
          ansible.builtin.set_fact:
            _r740xd_traefik_extra_ports: "{{ _r740xd_traefik_extra_ports | default([]) + r740xd_traefik_unific_ports }}"
        
        - name: "traefik | Enable UniFi Controller entrypoints"
          ansible.builtin.set_fact:
            _r740xd_traefik_entrypoints: "{{ _r740xd_traefik_entrypoints | default({}) | combine(r740xd_traefik_unific_entrypoints) }}"

- name: "traefik | Process Home Assistant network"
  when: "docker_networks.hass.name | default('') | trim | length > 0"
  block:
    - name: "traefik | Check if Home Assistant network exists"
      community.docker.docker_network_info:
        name: "{{ docker_networks.hass.name }}"
      register: "_r740xd_traefik_hass_network_info"

    - name: "traefik | Configure Traefik for Home Assistant"
      when: "_r740xd_traefik_hass_network_info.exists"
      block:
        - name: "traefik | Enable Home Assistant extra network"
          ansible.builtin.set_fact:
            _r740xd_traefik_extra_networks: "{{ _r740xd_traefik_extra_networks | default([]) + [{'name': docker_networks.hass.name}] }}"

        - name: "traefik | Enable Z-Wave JS UI entrypoints"
          ansible.builtin.set_fact:
            _r740xd_traefik_entrypoints: "{{ _r740xd_traefik_entrypoints | default({}) | combine(r740xd_traefik_zwavejsui_entrypoints) }}"

- name: "traefik | Process EMQX network"
  when: "docker_networks.emqx.name | default('', true) | trim | length > 0"
  block:
    - name: "traefik | Check if EMQX network exists"
      community.docker.docker_network_info:
        name: "{{ docker_networks.emqx.name }}"
      register: "_r740xd_traefik_emqx_network_info"

    - name: "traefik | Configure Traefik for EMQX"
      when: "_r740xd_traefik_emqx_network_info.exists"
      block:
        - name: "traefik | Enable EMQX extra network"
          ansible.builtin.set_fact:
            _r740xd_traefik_extra_networks: "{{ _r740xd_traefik_extra_networks | default([]) + [{'name': docker_networks.emqx.name}] }}"

        - name: "traefik | Enable EMQX entrypoints"
          ansible.builtin.set_fact:
            _r740xd_traefik_entrypoints: "{{ _r740xd_traefik_entrypoints | default({}) | combine(r740xd_traefik_emqx_entrypoints) }}"

- name: "traefik | Define all ports"
  ansible.builtin.set_fact:
    _r740xd_traefik_all_ports: "{{ (_r740xd_traefik_extra_ports | default([]) + r740xd_traefik_http_ports) | sort }}"

- name: "traefik | Debug entrypoints"
  ansible.builtin.debug:
    msg:
      - "Entrypoints: {{ _r740xd_traefik_entrypoints | default({}) }}"
      - "Extra networks: {{ _r740xd_traefik_extra_networks | default([]) }}"
      - "All ports: {{ _r740xd_traefik_all_ports | default([]) }}"

- name: "traefik | Create Traefik data volume"
  community.docker.docker_volume:
    name: "{{ r740xd_traefik_data_volume_name }}"

- name: "traefik | Get info on data volume"
  community.docker.docker_volume_info:
    name: "{{ r740xd_traefik_data_volume_name }}"
  register: "_r740xd_traefik_data_volume_info"

- name: "traefik | Create dynamic configuration directory"
  ansible.builtin.file:
    path: "{{ _r740xd_traefik_data_volume_info.volume.Mountpoint }}/dynamic"
    state: "directory"
    mode: "0755"

- name: "traefik | Setup Traefik"
  ansible.builtin.import_role:
    name: "traefik2"
  vars:
    traefik_image: "traefik:2"
    traefik_container_environment:
      # AWS_HOSTED_ZONE_ID: "{{ r740xd_aws_route53_hosted_zone_id }}"
      AWS_ACCESS_KEY_ID: "{{ r740xd_aws_route53_access_key_id }}"
      AWS_SECRET_ACCESS_KEY: "{{ r740xd_aws_route53_secret_access_key }}"
      AWS_REGION: "{{ r740xd_aws_route53_region }}"
      AWS_POLLING_INTERVAL: "15"
      AWS_PROPAGATION_TIMEOUT: "900"
      AWS_TTL: "60"
    traefik_qs_https: true
    # traefik_qs_https_redirect: "true"
    traefik_qs_https_le: true
    traefik_qs_https_le_mail: "{{ r740xd_traefik_letsencrypt_email }}"
    traefik_qs_log_level: INFO
    traefik_ports: "{{ _r740xd_traefik_all_ports }}"
    traefik_hostname: "{{ _r740xd_traefik_fqdn }}"
    traefik_confkey_api:
      dashboard: true # use this for enabling the dashboard
    traefik_confkey_certificatesResolvers:
      letsencrypt:
        acme:
          storage: "/etc/traefik/acme/acme.json"
          email: "{{ r740xd_traefik_letsencrypt_email }}"
          caServer: "{{ r740xd_traefik_letsencrypt_ca_server }}"
          dnsChallenge:
            provider: route53
            delayBeforeCheck: "10s"
            disablePropagationCheck: true
            resolvers:
              - "1.1.1.1:53" # Use external DNS to verify TXT record changes
              - "8.8.8.8:53" # Use external DNS to verify TXT record changes
    traefik_confkey_providers:
      docker:
        defaultRule: "Host(`{{ _r740xd_traefik_fqdn }}`)"
        exposedByDefault: false
      file:
        directory: "/etc/traefik/dynamic"
        watch: true
    traefik_labels:
      traefik.enable: "true"
      # Dashboard
      traefik.http.routers.traefik.service: "api@internal"
      traefik.http.routers.traefik.entrypoints: "https"
      traefik.http.routers.traefik.tls.certresolver: "letsencrypt"
      traefik.http.routers.traefik.tls.domains[0].main: "{{ _r740xd_traefik_fqdn }}"
      # Global redirect to https
      # traefik.http.routers.http-catchall.rule: "hostregexp(`{host:.+}`)" # TODO
      # traefik.http.routers.http-catchall.rule: "!hostregexp(`{host:ecowitt.*}`)"
      # traefik.http.routers.http-catchall.entrypoints: "http"
      # traefik.http.routers.http-catchall.middlewares: "redirect-to-https"
      # traefik.http.routers.http-catchall.priority: "10"
      # Middleware redirect
      # traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: "https"
    traefik_extra_networks: "{{ _r740xd_traefik_extra_networks }}"
    traefik_confkey_entryPoints: "{{ _r740xd_traefik_entrypoints }}"
    traefik_confkey_serversTransport:
      insecureSkipVerify: "true"
    traefik_confkey_log:
      level: INFO
      filePath: "/etc/traefik/log/traefik.log"
    traefik_confkey_accessLog:
      # filePath: "/etc/traefik/log/traefik-access.log"
      bufferingSize: 500
      format: "json"
      fields:
        defaultMode: "drop"
        # defaultMode: "keep"
        names:
          ClientAddr: "keep"
    #       ClientHost: "keep"
    #       ClientPort: "drop"
    #       ClientUsername: "drop"
    #       DownstreamContentSize: "drop"
          RequestHost: "keep"
    #       RequestLine: "keep"
          RequestMethod: "keep"
          RequestPath: "keep"
          # RequestProtocol: "keep"
          RequestScheme: "keep"
          RouterName": "keep"
          ServiceName: "keep"
          StartLocal: "keep"
          DownstreamStatus: "keep"
