---
- name: "Set login banner"
  ansible.builtin.copy:
    src: "motd.txt"
    dest: "/etc/motd"
    mode: "0644"
  tags: ["motd"]

- name: "Create NAS groups"
  ansible.builtin.group:
    name: "{{ __item.name }}"
    gid: "{{ __item.gid | default(omit) }}"
    system: "{{ __item.system | default(omit) }}"
    state: "{{ __item.state | default('present') }}"
  loop: "{{ r740xd_groups }}"
  loop_control:
    loop_var: __item
  tags: ["groups", "users", "usergroups"]

- name: "Create NAS users"
  ansible.builtin.import_role:
    name: "organicveggie.ansible-users"
  vars:
    users_list_host: "{{ r740xd_users }}"
  tags: ["groups", "users", "usergroups"]

- name: "Run common operations for all veggie servers"
  ansible.builtin.import_role:
    name: "veggie_common"
  vars:
    veggie_common_hostname: "{{ r740xd_domain_name }}"
    veggie_common_timezone: "{{ r740xd_timezone }}"
    veggie_common_admin_username: "{{ r740xd_admin_username }}"
    veggie_common_admin_passwd: "{{ r740xd_admin_passwd }}"
    veggie_common_extra_packages: "{{ r740xd_extra_packages }}"
  tags: ["common"]

- name: "Configure netplan networking"
  ansible.builtin.import_tasks: "netplan.yml"
  tags: ["netplan"]

- name: "Setup Logrotate"
  ansible.builtin.import_role: 
    name: "nickhammond.logrotate"
  vars:
    # TODO: Move this into rclone setup
    logrotate_scripts:
      - name: "rclone"
        path: "/var/log/rclone.log"
        options:
          - "daily"
          - "rotate 7"
          - "missingok"
          - "compress"
          - "delaycompress"
          - "copytruncate"
  tags: ["logrotate"]

- name: "Install Docker"
  ansible.builtin.import_tasks: "docker.yml"
  tags: ["docker"]

- name: "Install Portainer"
  ansible.builtin.import_tasks: "portainer.yml"
  tags: ["portainer"]

- name: "Setup Kometa Docker network"
  community.docker.docker_network:
    name: "{{ docker_networks.kometa.name }}"
    driver: "bridge"
    enable_ipv6: "no"
    internal: "no"
    scope: "local"
    ipam_config:
      - subnet: "{{ docker_networks.kometa.subnet }}"
        gateway: "{{ docker_networks.kometa.gateway }}"

- name: "Install Samba"
  ansible.builtin.import_tasks: "samba.yml"
  tags: ["samba"]

- name: "Setup TimeMachine"
  ansible.builtin.import_tasks: "time-machine.yml"
  vars:
    r740xd_time_machine_network_name: "{{ docker_macvlans.nas_macvlan.name }}"
  tags: ["time-machine", "timemachine", "tim"]

- name: "Setup Calibre Web"
  ansible.builtin.import_tasks: "calibre-web.yml"
  tags: ["calibre-web", "calibreweb", "calibre_web"]

- name: "Setup Diun"
  ansible.builtin.import_tasks: "diun.yml"
  tags: ["diun"]

- name: "Setup Glances"
  ansible.builtin.import_tasks: "glances.yml"
  tags: ["glances"]

- name: "Setup EMQX"
  ansible.builtin.import_tasks: "emqx.yml"
  tags: ["emqx"]

- name: "Setup Home Assistant"
  ansible.builtin.import_tasks: "hass.yml"
  tags: ["hass", "home-assistant", "homeassistant"]

- name: "Setup InfluxDB"
  ansible.builtin.import_tasks: "influxdb.yml"
  tags: ["influxdb"]

- name: "Setup Navidrome"
  ansible.builtin.import_tasks: "navidrome.yml"
  tags: ["navidrome"]

- name: "Setup Node-Red"
  ansible.builtin.import_tasks: "node-red.yml"
  tags: ["node-red", "nodered"]

- name: "Setup Seer"
  ansible.builtin.import_tasks: "seerr.yml"
  tags: ["seerr"]

- name: "Setup Plex"
  ansible.builtin.import_tasks: "plex.yml"
  vars:
    r740xd_plex_network_name: "{{ docker_macvlans.nas_macvlan.name }}"
  tags: ["plex", "pms"]

- name: "Setup Tautulli"
  ansible.builtin.import_tasks: "tautulli.yml"
  tags: ["tautulli"]

- name: "Setup Kometa"
  ansible.builtin.import_tasks: "kometa.yml"
  tags: ["kometa", "pmm", "plex-media-manager"]

- name: "Setup Servarr apps"
  ansible.builtin.import_tasks: "servarr.yml"
  tags: ["servarr"]

- name: "Setup Unifi Controller"
  ansible.builtin.import_tasks: "unific.yml"
  tags: ["unific"]

- name: "Setup Saurron"
  ansible.builtin.import_tasks: "saurron.yml"
  tags: ["saurron"]

- name: "Setup Prometheus"
  ansible.builtin.import_tasks: "prometheus.yml"
  tags: ["prometheus"]

# # - ansible.builtin.import_tasks: "influxdb.yml"
# #   tags: ["influxdb"]

# TODO: Grafana

- name: "Setup Tailscale"
  ansible.builtin.import_tasks: "tailscale.yml"
  tags: ["tailscale"]

# Traefik needs to be last so all of the networks exist.
- name: "Setup Traefik"
  ansible.builtin.import_tasks: "traefik.yml"
  tags: ["traefik"]

