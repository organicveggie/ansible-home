---
- name: "navidrome | Set fqdn"
  ansible.builtin.set_fact:
    _nas_navidrome_fqdn: "{{ r740xd_navidrome_host_name }}.{{ r740xd_navidrome_host_domain }}"

- name: "navidrome | Setup Docker network"
  community.docker.docker_network:
    name: "{{ docker_networks.navidrome.name }}"
    driver: "bridge"
    enable_ipv6: "no"
    internal: "no"
    scope: "local"
    ipam_config:
      - subnet: "{{ docker_networks.navidrome.subnet }}"
        gateway: "{{ docker_networks.navidrome.gateway }}"

- name: "navidrome | Create Docker container"
  ansible.builtin.import_role:
    name: "navidrome_docker"
  vars:
    navidrome_docker_base_url: "{{ navidrome_base_url }}"
    navidrome_docker_extra_networks:
      - name: "{{ docker_networks.navidrome.name }}"
    navidrome_docker_host_domain: "{{ r740xd_navidrome_host_domain }}"
    navidrome_docker_image_cache_size: "{{ r740xd_navidrome_image_cache_size }}"
    navidrome_docker_lastfm_enabled: "true"
    navidrome_docker_lastfm_apikey: "{{ r740xd_navidrome_lastfm_apikey }}"
    navidrome_docker_lastfm_secret: "{{ r740xd_navidrome_lastfm_secret }}"
    navidrome_docker_music_folder: "{{ r740xd_navidrome_music_folder }}"
    navidrome_docker_network: "{{ docker_networks.navidrome.name }}"
    navidrome_docker_spotify_client_id: "{{ r740xd_navidrome_spotify_client_id }}"
    navidrome_docker_spotify_client_secret: "{{ r740xd_navidrome_spotify_client_secret }}"
