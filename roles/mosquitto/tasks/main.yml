---
- name: "{{ mosquitto_docker_role_label }} | Create group for Mosquitto container"
  ansible.builtin.group:
    name: "{{ mosquitto_docker_group }}"
    gid: "{{ mosquitto_docker_gid }}"

- name: "{{ mosquitto_docker_role_label }} | Create user for Mosquitto container"
  ansible.builtin.user:
    name: "{{ mosquitto_docker_user }}"
    uid: "{{ mosquitto_docker_uid }}"
    group: "{{ mosquitto_docker_group }}"
    createhome: false

- name: "{{ mosquitto_docker_role_label }} | Create Mosquitto Docker volumes"
  community.docker.docker_volume:
    name: "{{ __item }}"
  with_items:
    - "{{ mosquitto_docker_volume_config_name }}"
    - "{{ mosquitto_docker_volume_data_name }}"
    - "{{ mosquitto_docker_volume_logs_name }}"
  loop_control:
    loop_var: __item

- name: "{{ mosquitto_docker_role_label }} | Set Docker mount list for volume mounts"
  ansible.builtin.set_fact:
    _mosquitto_docker_mount_list:
      - "source": "{{ mosquitto_docker_volume_config_name }}"
        "target": "/mosquitto/config"
        "type": 'volume'
      - "source": "{{ mosquitto_docker_volume_data_name }}"
        "target": "/mosquitto/data"
        "type": 'volume'
      - "source": "{{ mosquitto_docker_volume_logs_name }}"
        "target": "/mosquitto/log"
        "type": 'volume'

- name: "{{ mosquitto_docker_role_label }} | Ensure Docker volumes have correct ownership"
  ansible.builtin.include_tasks:
    file: "volume_ownership.yml"
  with_items:
    - "{{ mosquitto_docker_volume_config_name }}"
    - "{{ mosquitto_docker_volume_data_name }}"
    - "{{ mosquitto_docker_volume_logs_name }}"
  loop_control:
    loop_var: __volume_name

- name: "{{ mosquitto_docker_role_label }} | Get info on config volume"
  community.docker.docker_volume_info:
    name: "{{ mosquitto_docker_volume_config_name }}"
  register: "_mosquitto_docker_config_volume_info"

- name: "{{ mosquitto_docker_role_label }} | Create config file"
  ansible.builtin.template:
    src: "templates/mosquitto.conf.j2"
    dest: "{{ _mosquitto_docker_config_volume_info.volume.Mountpoint }}/mosquitto.conf"
    mode: "0660"
    owner: "{{ mosquitto_docker_user }}"
    group: "{{ mosquitto_docker_group }}"
  register: "_mosquitto_docker_modify_config"

- name: "{{ mosquitto_docker_role_label }} | Build container FQDN"
  ansible.builtin.set_fact:
    _mosquitto_docker_fqdn: "{{ mosquitto_docker_host_name }}.{{ mosquitto_docker_host_domain }}"

- name: "{{ mosquitto_docker_role_label }} | Create placeholder array for default network"
  ansible.builtin.set_fact:
    _mosquitto_docker_default_networks:
      - name: "{{ mosquitto_docker_network_name }}"
        aliases: "{{ mosquitto_docker_network_aliases | default(omit) }}"

- name: "{{ mosquitto_docker_role_label }} | Define all Docker networks for this container"
  ansible.builtin.set_fact:
    _mosquitto_docker_all_networks: >
      {{ _mosquitto_docker_default_networks + mosquitto_docker_extra_networks }}

- name: "{{ mosquitto_docker_role_label }} | Define Docker environment variables"
  ansible.builtin.set_fact:
    _mosquitto_docker_env: "{{ _mosquitto_docker_env | default({}) |
      combine({__item.key | string: __item.value | string}) }}"
  with_items:
    # - key: "MOSQUITTO_DYNSEC_PASSWORD"
    #   value: "{{ mosquitto_docker_dynamic_security_admin_passwd | default(omit) }}"
    - key: "MOSQUITTO_UID"
      value: "{{ mosquitto_docker_uid }}"
    - key: "MOSQUITTO_GID"
      value: "{{ mosquitto_docker_gid }}"
  loop_control:
    loop_var: __item
  no_log: true

- name: "{{ mosquitto_docker_role_label }} | Define Docker labels with Traefik disabled"
  ansible.builtin.set_fact:
    _mosquitto_docker_labels: "{{ _mosquitto_docker_labels | default({}) |
      combine({__item.key: __item.value}) }}"
  with_items:
    - key: "traefik.enable"
      value: "{{ mosquitto_docker_available_externally | lower | ternary('false', 'true') }}"
  loop_control:
    loop_var: __item
  when: "not mosquitto_docker_available_externally"

- name: "{{ mosquitto_docker_role_label }} | Define Docker labels with Traefik enabled"
  ansible.builtin.set_fact:
    _mosquitto_docker_labels: "{{ _mosquitto_docker_labels | default({}) |
      combine({__item.key: __item.value}) }}"
  with_items:
    - key: "traefik.enable"
      value: "{{ mosquitto_docker_available_externally }}"
    - key: "traefik.docker.network"
      value: "{{ mosquitto_docker_network_name }}"
    - key: "traefik.tcp.routers.mosquitto.entrypoints"
      value: "mosquitto"
    - key: "traefik.tcp.routers.mosquitto.rule"
      value: "HostSNI(`*`)"
    - key: "traefik.tcp.routers.mosquitto.service"
      value: "mosquitto"
    - key: "traefik.tcp.services.mosquitto.loadbalancer.server.port"
      value: "{{ mosquitto_docker_listen_port }}"
  loop_control:
    loop_var: __item
  when: "mosquitto_docker_available_externally"

- name: "{{ mosquitto_docker_role_label }} | Add Traefik labels if the WebSocket listener is enabled"
  ansible.builtin.set_fact:
    _mosquitto_docker_labels: "{{ _mosquitto_docker_labels | default({}) |
      combine({__item.key: __item.value}) }}"
  with_items:
    - key: "traefik.tcp.routers.mosquitto_ws.entrypoints"
      value: "mosquitto_ws"
    - key: "traefik.tcp.routers.mosquitto_ws.rule"
      value: "HostSNI(`*`)"
    - key: "traefik.tcp.routers.mosquitto_ws.service"
      value: "mosquitto_ws"
    - key: "traefik.tcp.services.mosquitto_ws.loadbalancer.server.port"
      value: "{{ mosquitto_docker_ws_listen_port }}"
  loop_control:
    loop_var: __item
  when: "mosquitto_docker_available_externally and (mosquitto_docker_ws_listen_port | default('', true) | string | length > 0)"

- name: "{{ mosquitto_docker_role_label }} | Define user-supplied extra Docker labels"
  ansible.builtin.set_fact:
    _mosquitto_docker_labels: "{{ _mosquitto_docker_labels | default({}) |
      combine({__item.key: __item.value}) }}"
  loop: "{{ mosquitto_docker_extra_labels | dict2items }}"
  loop_control:
    loop_var: __item

- name: "{{ mosquitto_docker_role_label }} | Create Docker Container"
  community.docker.docker_container:
    name: "{{ mosquitto_docker_name }}"
    image: "{{ mosquitto_docker_image_name }}:{{ mosquitto_docker_image_version }}"
    pull: true
    mounts: "{{ _mosquitto_docker_mount_list }}"
    network_mode: "{{ mosquitto_docker_network_name }}"
    networks: "{{ _mosquitto_docker_all_networks }}"
    env: "{{ _mosquitto_docker_env }}"
    etc_hosts: "{{ mosquitto_docker_extra_hosts | default(omit) }}"
    restart_policy: unless-stopped
    restart: |
      {{ _mosquitto_docker_modify_config.changed | default(false) }}
    memory: "{{ mosquitto_docker_memory }}"
    cpus: "{{ mosquitto_docker_cpus }}"
    container_default_behavior: no_defaults
    auto_remove: no
    detach: yes
    init: yes
    interactive: no
    paused: no
    privileged: no
    read_only: no
    tty: no
    labels: "{{ _mosquitto_docker_labels }}"

- name: "{{ mosquitto_docker_role_label }} | Check if dynsec config file exists"
  ansible.builtin.stat:
    path: "{{ mosquitto_docker_dynamic_security_config }}"
  register: _mosquitto_docker_dynsec_cfg_file

- name: "{{ mosquitto_docker_role_label }} | Initialize dynsec admin user"
  community.docker.docker_container_exec:
    container: "{{ mosquitto_docker_name }}"
    command: >
      {{ mosquitto_docker_shell }} -c "{{ mosquitto_docker_ctrl_bin }} dynsec init 
      {{ mosquitto_docker_dynamic_security_config }} 
      admin {{ mosquitto_docker_dynamic_security_admin_passwd }}"
  when: _mosquitto_docker_dynsec_cfg_file.stat.exists is defined and not _mosquitto_docker_dynsec_cfg_file.stat.exists

- name: "{{ mosquitto_docker_role_label }} | Setup dynsec roles"
  ansible.builtin.include_tasks:
    file: "add_role.yml"
  loop: "{{ mosquitto_docker_roles | default([]) }}"
  loop_control:
    loop_var: __item

- name: "{{ mosquitto_docker_role_label }} | Setup dynsec clients"
  ansible.builtin.include_tasks:
    file: "add_client.yml"
  loop: "{{ mosquitto_docker_users | default([]) }}"
  loop_control:
    loop_var: __item
