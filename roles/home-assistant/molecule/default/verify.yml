---
- name: Verify
  hosts: all
  gather_facts: false

  vars:
    hass_docker_network_name: "hass-test"

  tasks:
    - name: Get info on data volume
      community.docker.docker_volume_info:
        name: "{{ hass_docker_volume_name_data }}"
      register: config_vol_info

    - name: Verify data volume exists
      ansible.builtin.assert:
        that: config_vol_info.exists

    - name: Get info on Home Assistant container
      community.docker.docker_container_info:
        name: hass
      register: con_info

    - name: Verify container exists
      ansible.builtin.assert:
        that: con_info.exists
