---
- name: "traefik3 | extra labels | {{ item.field }} | key/value"
  ansible.builtin.set_fact:
    __label_kv: >
          { "key": "traefik.{{ item.entrypoint }}.{{ item.field }}", 
            "value": "{{ item.value }}" }

- name: "traefik3 | extra labels | {{ item.field }} | add to labels"
  ansible.builtin.set_fact:
    _traefik3_extra_labels: "{{ _traefik3_extra_labels | default({}) | combine({__label_kv.key: __label_kv.value}) }}"
