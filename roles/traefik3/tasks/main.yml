---
# tasks file for traefik3
- name: "traefik3 | Build container FQDN"
  ansible.builtin.set_fact:
    _traefik3_docker_fqdn: "{{ traefik3_docker_host_name }}.{{ traefik3_docker_host_domain }}"

- name: "traefik3 | Create container volumes"
  community.docker.docker_volume:
    name: "{{ item }}"
  loop:
    - "{{ traefik3_config_volume_name }}"
    - "{{ traefik3_log_volume_name }}"

- name: "traefik3 | Get info on config volume"
  community.docker.docker_volume_info:
    name: "{{ traefik3_config_volume_name }}"
  register: "traefik3_volume_info"

- name: "traefik3 | Build target path to config volume"
  ansible.builtin.set_fact:
    _traefik3_docker_volume_path:
      "{{ _traefik3_docker_volume_info['volume']['Mountpoint'] }}"

- name: "traefik3 | Access Log options"
  when: "traefik3_conf_access_log_enabled"
  block:
    - name: "traefik3 | access logs | filters"
      ansible.builtin.set_fact:
        _traefik3_access_log_filters:
          filters: "{{ traefik3_conf_access_log_filters }}"
      when: "traefik3_conf_access_log_filters | dict2items | length > 0"

    - name: "traefik3 | access logs | fields names"
      ansible.builtin.set_fact:
        _traefik3_access_log_fields_names:
          names: "{{ traefik3_conf_access_log_fields_names }}"
      when: "traefik3_conf_access_log_fields_names | dict2items | length > 0"

    - name: "traefik3 | access logs | fields"
      ansible.builtin.set_fact:
        _traefik3_access_log_fields: >
          {{ __access_logs_fields_mode | combine(__access_logs_names) | combine(__access_logs_extras) }}
      vars:
        __access_logs_extras: "{{ traefik3_conf_access_log_fields_extras | default({}) }}"
        __access_logs_names: "{{ _traefik3_access_log_fields_names | default() }}"
        __access_logs_fields_mode:
          defaultMode: "{{ traefik3_conf_access_log_fields_default_mode }}"

    - name: "traefik3 | access logs | main options"
      ansible.builtin.set_fact:
        _traefik3_access_log_all_options:
          accessLog: >
            {{ __access_log_options | combine(__access_logs_filters) | combine(__access_log_extras) }}
      vars:
        __access_log_extras: "{{ traefik3_conf_access_log_extra_options | default({}) }}"
        __access_logs_filters: "{{ _traefik3_access_log_filters | default({}) }}"
        __access_log_options:
          bufferingSize: "{{ traefik3_conf_access_log_buffering_size | int }}"
          filePath: "{{ traefik3_conf_access_log_file }}"
          format: "{{ traefik3_conf_access_log_format }}"
          fields:
            defaultMode: "{{ traefik3_conf_access_log_fields_default_mode }}"
            headers: "{{ traefik3_conf_access_log_fields_headers | default(omit) }}"
            names: "{{ traefik3_conf_access_log_fields_names | default(omit)  }}"

- name: "traefik3 | Dashboard"
  when: "traefik3_dashboard_enabled"
  block:
    - name: "traefik3 | Dashboard | Set default FQDN"
      ansible.builtin.set_fact:
        _traefik3_dashboard_fqdn: "{{ _traefik3_docker_fqdn }}"
      when: "traefik3_dashboard_fqdn | default('') | length <= 0"

    - name: "traefik3 | Dashboard | Use explicitly defined FQDN"
      ansible.builtin.set_fact:
        _traefik3_dashboard_fqdn: "{{ traefik3_dashboard_fqdn }}"
      when: "traefik3_dashboard_fqdn | default('') | length > 0"

    - name: "traefik3 | Dashboard | entrypoints"
      ansible.builtin.set_fact:
        _traefik3_dashboard_entrypoints:
          http:
            address: ":{{ traefik3_dashboard_port_insecure }}"
            reusePort: true
            http:
              redirections:
                entryPoint:
                  to: https
                  scheme: https

          https:
            address: ":{{ traefik3_dashboard_port_secure }}"
            reusePort: true
            asDefault: true

    - name: "traefik3 | Dashboard | insecure api entrypoint"
      ansible.builtin.set_fact:
        _traefik3_dashboard_entrypoints: >
          {{ _traefik3_dashboard_entrypoints | default({}) | combine(_traefik3_dashboard_insecure_entrypoint) }}
      vars:
        _traefik3_dashboard_insecure_entrypoint:
          traefik:
            address: ":8181"
            reusePort: true
      when: "traefik3_dashboard_api_insecure"

    - name: "traefik3 | Dashboard | labels"
      ansible.builtin.set_fact:
        _traefik3_dashboard_labels:
          # "traefik.http.routers.traefik.rule": "Host(`{{ _traefik3_dashboard_fqdn }}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
          "traefik.http.routers.dashboard.rule": "Host(`{{ _traefik3_dashboard_fqdn }}`)"
          "traefik.http.routers.dashboard.service": "api@internal"
          "traefik.http.routers.dashboard.entrypoints": "https"
          "traefik.http.routers.dashboard.tls": "true"
          "traefik.http.routers.dashboard.tls.certresolver": "letsencrypt"
          "traefik.http.routers.dashboard.tls.domains[0].main": "{{ _traefik3_dashboard_fqdn }}"

- name: "traefik3 | Logging options"
  ansible.builtin.set_fact:
    _traefik3_logging_all_options:
      log: >
        {{ __logging_quick_options | combine(__logging_extras) }}
  vars:
    __logging_extras: "{{ traefik3_conf_logging_extra_options | default({}) }}"
    __logging_quick_options:
        filePath: "{{ traefik3_conf_logging_file }}"
        format: "{{ traefik3_conf_logging_format }}"
        level: "{{ traefik3_conf_logging_level }}"

- name: "traefik3 | Metrics options"
  ansible.builtin.set_fact:
    _traefik3_metrics_all_options:
      metrics: "{{ traefik3_conf_metrics }}"

- name: "traefik3 | Create config file"
  ansible.builtin.template:
    src: "templates/traefik.yml.j2"
    dest: "{{ _traefik3_volume_path }}/traefik.yml"
    mode: "0644"
  vars:
    _traefik3_conf_cert_resolvers:
      certificatesResolvers: "{{ traefik3_conf_cert_resolvers }}"
    _traefik3_conf_entrypoints:
      entrypoints: "{{ traefik3_conf_entrypoints | combine(_traefik3_dashboard_entrypoints | default({})) }}"
    _traefik3_conf_providers:
      providers: "{{ traefik3_conf_providers }}"
    _traefik3_conf_tracing:
      tracing: "{{ traefik3_conf_tracing_options | default({}) }}"
  register: _traefik3_config

- name: "traefik3 | Set Docker mount list for volume mounts"
  ansible.builtin.set_fact:
    _traefik3_docker_volume_mount_list: "{{ _traefik3_bind_mounts + _traefik3_volume_mounts }}"
  vars:
    _traefik3_bind_mounts:
      - source: "/var/run/docker.sock"
        target: "/var/run/docker.sock"
        type: "bind"
    _traefik3_volume_mounts:
      - source: "{{ traefik3_config_volume_name }}"
        target: "/etc/traefik"
        type: "volume"
      - source: "{{ traefik3_log_volume_name }}"
        target: "/var/log/traefik"
        type: "volume"

- name: "traefik3 | Set Docker mount list for bind mounts"
  ansible.builtin.set_fact:
    _traefik3_docker_bind_mount_list: "{{_traefik3_docker_bind_mount_list | default([]) + 
      [ {'source': item.key, 'target': item.value, 'read_only': true, 'type': 'bind'} ] }}"
  loop: "{{ traefik3_docker_bind_mounts | dict2items }}"
- name: "traefik3 | Dashboard labels"
  ansible.builtin.set_fact:
    _traefik3_dashboard_labels:
      "traefik.http.routers.dashboard.rule": "Host(`{{ _traefik3_dashboard_fqdn }}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      "traefik.http.routers.dashboard.service": "api@internal"
  when: "traefik3_dashboard_enabled"

- name: "traefik3 | Dashboard middleware"
  when: "traefik3_dashboard_enabled and traefik3_dashboard_middleware_names"
  block:
    - name: "traefik3 | Dashboard router middleware labels"
      ansible.builtin.set_fact:
        _traefik3_dashboard_labels: >
          {{ _traefik3_dashboard_labels | default({}) | combine(__dashboard_middleware_label) }}
      vars:
        __dashboard_middleware_label:
          "traefik.http.routers.traefik.middlewares": "{{ traefik3_dashboard_middleware_names }}"

    - name: "traefik3 | Dashboard middleware labels"
      ansible.builtin.set_fact:
        _traefik3_dashboard_labels: >
          {{ _traefik3_dashboard_labels | default({}) |
          combine({"traefik.http.middleware." + item.key: item.value}) }}
        loop: "{{ traefik3_dashboard_middleware_labels }}"

- name: "traefik3 | Global HTTP-to-HTTPS redirect labels"
  ansible.builtin.set_fact:
    _traefik3_http_redirect_labels: "{{ traefik3_http_redirect_labels }}"
  when: "traefik3_redirect_http"

- name: "traefik3 | Define container labels"
  ansible.builtin.set_fact:
    _traefik3_all_labels: >
      {{ __labels_dashboard | combine(__labels_http_redirect) | combine(__labels_traefik_enable) }}
  vars:
    __labels_dashboard: "{{ _traefik3_dashboard_labels | default({}) }}"
    __labels_http_redirect: "{{ _traefik3_traefik3_http_redirect_labels }}"
    __labels_traefik_enable:
      traefik.enable: "true"

- name: "traefik3 | Create traefik.yml"
  ansible.builtin.template:
    src: "templates/traefik.yml.j2"
    dest: "{{ _traefik3_docker_volume_path }}/traefik.yml"
    mode: "0664"
  register: "_traefik3_docker_config"

- name: "traefik3 | Create placeholder array for default network"
  ansible.builtin.set_fact:
    _traefik3_docker_default_networks:
      - name: "{{ traefik3_docker_network }}"
        aliases: "{{ traefik3_docker_network_aliases | default(omit) }}"

- name: "traefik3 | Define all Docker networks for this container"
  ansible.builtin.set_fact:
    _traefik3_docker_all_networks: >
      {{ _traefik3_docker_default_networks + traefik3_docker_extra_networks }}

- name: "traefik3 | Define Docker port map"
  ansible.builtin.set_fact:
    _traefik3_docker_ports: "{{ _traefik3_docker_ports | default([]) + [item] }}"
  loop: "{{ traefik3_docker_port_map_list }}"

- name: "traefik3 | Define placeholder Docker environment variables"
  ansible.builtin.set_fact:
    _traefik3_docker_env_vars: {}

- name: "traefik3 | Define environment variables"
  ansible.builtin.set_fact:
    _traefik3_all_env_vars: >
      {{ _traefik3_std_env_vars | combine(traefik3_extra_env_vars) }}
  vars:
    _traefik3_std_env_vars:
      "TZ": "{{ traefik3_timezone }}"   

- name: "traefik3 | Define Docker environment variables"
  ansible.builtin.set_fact:
    _traefik3_docker_env_vars: "{{ _traefik3_docker_env_vars | default({}) |
      combine({item.key: item.value}) }}"
  loop: "{{ traefik3_docker_extra_env_vars | dict2items }}"

