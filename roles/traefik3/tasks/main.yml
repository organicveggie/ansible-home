- name: "traefik3 | Debug container labels"
  ansible.builtin.debug:
    msg: "{{ _traefik3_all_labels }}"

- name: "traefik3 | Debug traefik.yml"
  ansible.builtin.debug:
    msg: "{{ _traefik3_docker_volume_path }}/traefik.yml"

