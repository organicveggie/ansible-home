---
- name: Install dependencies
  hosts: all
  become: true

  vars:
    pip_install_packages:
      - name: docker
    docker_daemon_options:
      storage-driver: "vfs"

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      when: ansible_facts["os_family"] == 'Debian'

    - name: Wait for systemd to complete initialization
      ansible.builtin.systemd_service:
      register: _node_exporter_docker_systemd_status
      until: >
        'running' == _node_exporter_docker_systemd_status.ansible_facts.ansible_systemd.health or
        'degraded' == _node_exporter_docker_systemd_status.ansible_facts.ansible_systemd.health
      retries: 30
      delay: 5
      when: ansible_facts["service_mgr"] == 'systemd'
      changed_when: false

  roles:
    - geerlingguy.pip
    - geerlingguy.docker

- name: Converge
  hosts: all
  become: true

  roles:
    - role: node_exporter_docker
      vars:
        node_exporter_docker_bind_root_propagation: null
